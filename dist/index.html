<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>

/* ===== src/math.js ===== */
/* ============================================================
   rittai-anim 幾何コア (THREE非依存・純関数)
   - splitPolyhedron: 凸多面体を平面で2分割し切り口を返す
   - computeUnfold  : 三角すいの展開ヒンジ角を計算
   - solveWaterLevel: おもり沈めの水位を反復計算
   ============================================================ */

// ---- vec utils ([x,y,z]) ----
const vAdd = (a, b) => [a[0] + b[0], a[1] + b[1], a[2] + b[2]];
const vSub = (a, b) => [a[0] - b[0], a[1] - b[1], a[2] - b[2]];
const vScale = (a, s) => [a[0] * s, a[1] * s, a[2] * s];
const vDot = (a, b) => a[0] * b[0] + a[1] * b[1] + a[2] * b[2];
const vCross = (a, b) => [
  a[1] * b[2] - a[2] * b[1],
  a[2] * b[0] - a[0] * b[2],
  a[0] * b[1] - a[1] * b[0],
];
const vLen = (a) => Math.hypot(a[0], a[1], a[2]);
const vNorm = (a) => vScale(a, 1 / vLen(a));
const vLerp = (a, b, t) => [
  a[0] + (b[0] - a[0]) * t,
  a[1] + (b[1] - a[1]) * t,
  a[2] + (b[2] - a[2]) * t,
];

// ---- ロドリゲス回転: point を (origin, axis[単位]) まわりに angle 回転 ----
function rotAxis(p, origin, axis, angle) {
  const v = vSub(p, origin);
  const c = Math.cos(angle), s = Math.sin(angle);
  const term1 = vScale(v, c);
  const term2 = vScale(vCross(axis, v), s);
  const term3 = vScale(axis, vDot(axis, v) * (1 - c));
  return vAdd(origin, vAdd(vAdd(term1, term2), term3));
}

/* ============================================================
   凸多面体の平面分割
   verts: [[x,y,z],...]  faces: 頂点indexのループ(外向き) plane: {n:[..], d}
   戻り値: { below:[面(点配列)…], above:[…], cap:[点…(nに対しCCW)] }
   below = n·x <= d 側
   ============================================================ */
function splitPolyhedron(verts, faces, plane) {
  const EPS = 1e-7;
  const sd = (p) => vDot(plane.n, p) - plane.d;
  const below = [], above = [];
  const capMap = new Map();
  const key = (p) => p.map((x) => Math.round(x * 1e4)).join(",");

  for (const f of faces) {
    const pts = f.map((i) => verts[i]);
    const outB = [], outA = [];
    for (let i = 0; i < pts.length; i++) {
      const a = pts[i], b = pts[(i + 1) % pts.length];
      const da = sd(a), db = sd(b);
      if (da <= EPS) outB.push(a);
      if (da >= -EPS) outA.push(a);
      if (Math.abs(da) <= EPS) capMap.set(key(a), a); // 平面上の頂点も切り口に含める
      if ((da < -EPS && db > EPS) || (da > EPS && db < -EPS)) {
        const t = da / (da - db);
        const p = vLerp(a, b, t);
        outB.push(p); outA.push(p);
        capMap.set(key(p), p);
      }
    }
    if (outB.length >= 3) below.push(outB);
    if (outA.length >= 3) above.push(outA);
  }

  // 切り口の点を平面内で角度ソート (nに対してCCW)
  const capPts = [...capMap.values()];
  let cap = [];
  if (capPts.length >= 3) {
    const c = capPts.reduce((s, p) => vAdd(s, p), [0, 0, 0]).map((x) => x / capPts.length);
    const n = vNorm(plane.n);
    let u = vCross(n, Math.abs(n[0]) < 0.9 ? [1, 0, 0] : [0, 1, 0]);
    u = vNorm(u);
    const v = vCross(n, u);
    cap = capPts
      .map((p) => {
        const r = vSub(p, c);
        return { p, ang: Math.atan2(vDot(r, v), vDot(r, u)) };
      })
      .sort((a, b) => a.ang - b.ang)
      .map((o) => o.p);
  }
  return { below, above, cap };
}


/* 汎用ヒンジ角: 床上のヒンジ辺(a-b)を軸に、点p0(床の上方)を
   固定領域の重心cFixと反対側へ倒して床に落とす回転角を返す */
function hingeAlpha(a, b, p0, cFix) {
  const axis = vNorm(vSub(b, a));
  let dir = vSub(vScale(vAdd(a, b), 0.5), cFix);
  dir = vSub(dir, vScale(axis, vDot(dir, axis)));
  dir[1] = 0;
  const d = vNorm(dir);
  let q = vSub(p0, a);
  q = vSub(q, vScale(axis, vDot(q, axis)));
  const qn = vNorm(q);
  const cr = vCross(qn, d);
  return { axis, alpha: Math.atan2(vDot(cr, axis), vDot(qn, d)) };
}

/* ============================================================
   三角すい O-PQR の展開計算
   面 fixedFace を床(y=0)に固定し、残り3面をヒンジで開く。
   solid: {verts:{name:[x,y,z]}, faces:[ [names...] ], fixed:"OQR面のname配列"}
   戻り値: {
     T,                    // 変換後の頂点座標 {name:[x,y,z]}
     moving: [{names:[a,b,apex], a,b,p0, axis, alpha}],  // ヒンジ情報
     flat:   [apexの展開後座標,...],
     center                // シーン中心(カメラ用)
   }
   ============================================================ */
function computeUnfold(vertsIn, fixedNames, movingDefs) {
  // fixedNames = [n0,n1,n2]: 床に置く面 / movingDefs = [{hinge:[a,b], apex:c}, ...]
  const O = vertsIn[fixedNames[0]], Q = vertsIn[fixedNames[1]], R = vertsIn[fixedNames[2]];
  // 面の法線。頂点(apex)側が +y になるよう符号調整
  let n = vNorm(vCross(vSub(Q, O), vSub(R, O)));
  const anyApex = vertsIn[movingDefs[0].apex];
  if (vDot(vSub(anyApex, O), n) < 0) n = vScale(n, -1);
  const origin = Q;
  const xhat = vNorm(vSub(R, Q));
  const yhat = n;
  const zhat = vCross(xhat, yhat);
  const toWorld = (p) => {
    const d = vSub(p, origin);
    return [vDot(d, xhat), vDot(d, yhat), vDot(d, zhat)];
  };
  const T = {};
  for (const k in vertsIn) T[k] = toWorld(vertsIn[k]);

  // 固定面の重心 (床上)
  const cFix = vScale(vAdd(vAdd(T[fixedNames[0]], T[fixedNames[1]]), T[fixedNames[2]]), 1 / 3);

  const moving = movingDefs.map((def) => {
    const a = T[def.hinge[0]], b = T[def.hinge[1]], p0 = T[def.apex];
    const axis = vNorm(vSub(b, a));
    // 開く方向 d: ヒンジ中点から固定面重心と逆向き・軸に垂直な床方向
    let dir = vSub(vScale(vAdd(a, b), 0.5), cFix);
    dir = vSub(dir, vScale(axis, vDot(dir, axis)));
    dir[1] = 0;
    const d = vNorm(dir);
    // 現在のapex位置の軸垂直成分 q
    let q = vSub(p0, a);
    q = vSub(q, vScale(axis, vDot(q, axis)));
    const qn = vNorm(q);
    const cr = vCross(qn, d);
    const alpha = Math.atan2(vDot(cr, axis), vDot(qn, d));
    return { names: [...def.hinge, def.apex], a, b, p0, axis, alpha };
  });

  const flat = moving.map((m) => rotAxis(m.p0, m.a, m.axis, m.alpha));

  // シーン中心: 展開後の全点のバウンディング中心
  const all = [T[fixedNames[0]], T[fixedNames[1]], T[fixedNames[2]], ...flat];
  const mn = [Infinity, Infinity, Infinity], mx = [-Infinity, -Infinity, -Infinity];
  for (const p of all) for (let i = 0; i < 3; i++) { mn[i] = Math.min(mn[i], p[i]); mx[i] = Math.max(mx[i], p[i]); }
  const center = vScale(vAdd(mn, mx), 0.5);

  return { T, moving, flat, center };
}

/* ============================================================
   水位ソルバー
   baseArea: 容器底面積, waterVol: 水の体積,
   wBottom: おもり底面の高さ, wArea: おもり底面積の和, wHeight: おもりの高さ
   容器の水位 L を  baseArea*L = waterVol + wArea*clamp(L - wBottom, 0, wHeight)
   の不動点反復で解く
   ============================================================ */
function solveWaterLevel(baseArea, waterVol, wBottom, wArea, wHeight) {
  // 場合分けで厳密に解く(区分線形)
  const L0 = waterVol / baseArea;                              // 全く浸からない
  if (L0 <= wBottom) return L0;
  const Lfull = (waterVol + wArea * wHeight) / baseArea;       // 完全に沈む
  if (Lfull >= wBottom + wHeight) return Lfull;
  return (waterVol - wArea * wBottom) / (baseArea - wArea);    // 一部だけ浸かる
}

if (typeof module !== "undefined") {
  module.exports = { hingeAlpha, vAdd, vSub, vScale, vDot, vCross, vLen, vNorm, vLerp, rotAxis, splitPolyhedron, computeUnfold, solveWaterLevel };
}


/* ===== src/core/util.js ===== */
// ==== 共通ユーティリティ(バックエンド非依存) ====
"use strict";

const clamp01 = (x) => Math.max(0, Math.min(1, x));
const easeInOut = (t) => (t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2);
const lerp = (a, b, t) => a + (b - a) * t;

// 3Dビルダー用: [x,y,z] → THREE.Vector3(three-helpers 側で THREE を使う)
const V3 = (a) => new THREE.Vector3(a[0], a[1], a[2]);


/* ===== src/core/palette.js ===== */
// ==== 配色パレット(3D=hex / 2D=CSS文字列。同じ色を両方で共有) ====
// 配色ルール: モノトーン基調 / 赤=注目 / 青=水。新しい色を足さない。
"use strict";

// 3D(Three.js)用の16進
const COL = {
  solid: 0xeef1f5, solid2: 0xdfe4ea, cap: 0xf3d9d5,
  edge: 0x2c3a55, red: 0xd9463e, redSoft: 0xe4867d,
  water: 0x4e9ed9, glass: 0xd8dee6,
  gridA: 0xd6dce2, gridB: 0xe8ebef,
};

// 2D(Canvas)用のCSS文字列。COLと対応。
const C2D = {
  ink: "#24354d",       // 基本の線・文字(濃紺)
  edge: "#2c3a55",      // 図形の輪郭
  solid: "#eef1f5",     // 面の塗り(薄)
  solid2: "#dfe4ea",    // 面の塗り(やや濃)/ 区別用
  red: "#d9463e",       // 注目(点・強調線・答え)
  redSoft: "#e4867d",   // 注目(淡)
  redFill: "rgba(217,70,62,0.14)",   // 注目領域の塗り
  blue: "#356ba8",      // 補助の線・軸ラベル
  water: "#4e9ed9",     // 水
  waterFill: "rgba(78,158,217,0.42)",
  green: "#4a8f6d",     // 2本目の動点など(赤・青と区別)
  grid: "#e2e8ef",      // 方眼(細)
  gridBold: "#cdd7e2",  // 方眼(基準線)
  axis: "#8494a8",      // グラフの軸
  ghost: "#9aa7b8",     // 補助・軌跡
  paper: "#fbfcfd",     // 背景
};


/* ===== src/core/hittest.js ===== */
// ==== なぞり判定(純関数)。quizモードの region ヒットテスト ====
// すべてワールド座標で判定する。座標変換(画面→ワールド)もここに置く。
// エンジン非依存・DOM非依存なので node のテストでそのまま検証できる。
"use strict";

// 画面ピクセル → ワールド座標(canvas2d の makeG と逆変換)
function screenToWorld(px, py, view) {
  const x = (px - view.ox) / view.scale;
  const y = view.yUp ? (view.oy - py) / view.scale : (py - view.oy) / view.scale;
  return [x, y];
}

// 点が region の shape に含まれるか
// shape: { kind:"rect", x,y,w,h } … x..x+w, y..y+h(向きは数値としてのみ扱う)
//        { kind:"poly", pts:[[x,y],...] }
//        { kind:"seg",  a:[x,y], b:[x,y], r }  … 線分から距離r以内
function pointInShape(p, shape) {
  if (!Array.isArray(p) || p.length < 2 || !shape || !Number.isFinite(p[0]) || !Number.isFinite(p[1])) return false;
  if (shape.kind === "rect") {
    const x0 = Math.min(shape.x, shape.x + shape.w), x1 = Math.max(shape.x, shape.x + shape.w);
    const y0 = Math.min(shape.y, shape.y + shape.h), y1 = Math.max(shape.y, shape.y + shape.h);
    return p[0] >= x0 && p[0] <= x1 && p[1] >= y0 && p[1] <= y1;
  }
  if (shape.kind === "poly") {
    // ray casting
    const pts = shape.pts;
    if (!Array.isArray(pts) || pts.length < 3) return false;
    let inside = false;
    for (let i = 0, j = pts.length - 1; i < pts.length; j = i++) {
      const xi = pts[i][0], yi = pts[i][1], xj = pts[j][0], yj = pts[j][1];
      if (distToSeg(p, pts[j], pts[i]) <= 1e-9) return true; // 辺上も領域に含める
      if ((yi > p[1]) !== (yj > p[1]) && p[0] < ((xj - xi) * (p[1] - yi)) / (yj - yi) + xi) inside = !inside;
    }
    return inside;
  }
  if (shape.kind === "seg") {
    return distToSeg(p, shape.a, shape.b) <= (shape.r || 0.5);
  }
  return false;
}

function distToSeg(p, a, b) {
  const vx = b[0] - a[0], vy = b[1] - a[1];
  const wx = p[0] - a[0], wy = p[1] - a[1];
  const c1 = vx * wx + vy * wy;
  if (c1 <= 0) return Math.hypot(wx, wy);
  const c2 = vx * vx + vy * vy;
  if (c2 <= c1) return Math.hypot(p[0] - b[0], p[1] - b[1]);
  const t = c1 / c2;
  return Math.hypot(p[0] - (a[0] + t * vx), p[1] - (a[1] + t * vy));
}

function shapeSampleStep(shape) {
  let span = 1;
  if (shape.kind === "rect") span = Math.min(Math.abs(shape.w), Math.abs(shape.h));
  else if (shape.kind === "poly" && Array.isArray(shape.pts) && shape.pts.length) {
    const xs = shape.pts.map((p) => p[0]), ys = shape.pts.map((p) => p[1]);
    span = Math.min(Math.max(...xs) - Math.min(...xs), Math.max(...ys) - Math.min(...ys));
  } else if (shape.kind === "seg") span = Math.max((shape.r || 0.5) * 2, 0.1);
  return Math.max((Number.isFinite(span) && span > 0 ? span : 1) / 8, 0.02);
}

// PointerEvent の発生頻度に左右されないよう、軌跡を等間隔に再サンプリングする。
// 戻り値は軌跡のうち shape 内にある長さの近似割合。
function strokeHitScore(strokePts, shape) {
  if (!Array.isArray(strokePts) || !strokePts.length) return 0;
  if (strokePts.length === 1) return pointInShape(strokePts[0], shape) ? 1 : 0;
  const step = shapeSampleStep(shape);
  let insideLength = 0, totalLength = 0;
  for (let i = 1; i < strokePts.length; i++) {
    const a = strokePts[i - 1], b = strokePts[i];
    const len = Math.hypot(b[0] - a[0], b[1] - a[1]);
    if (!Number.isFinite(len) || len <= 1e-9) continue;
    const n = Math.min(256, Math.max(1, Math.ceil(len / step)));
    const piece = len / n;
    for (let j = 0; j < n; j++) {
      const t = (j + 0.5) / n;
      if (pointInShape([a[0] + (b[0] - a[0]) * t, a[1] + (b[1] - a[1]) * t], shape)) insideLength += piece;
    }
    totalLength += len;
  }
  // 指がほぼ動かなかった場合はタップとして扱う。
  if (totalLength <= 1e-9) return strokePts.some((p) => pointInShape(p, shape)) ? 1 : 0;
  return insideLength / totalLength;
}

// ストローク(ワールド座標の点列)が region にヒットしたか。
// タップは中ならヒット。なぞりは軌跡の過半が中ならヒット。
function strokeHitsShape(strokePts, shape) {
  return strokeHitScore(strokePts, shape) >= 0.5;
}

// ストロークに最もよくヒットする region を1つ返す(なければ null)
function pickRegion(strokePts, regions) {
  let best = null, bestScore = 0;
  for (const r of regions) {
    const score = strokeHitScore(strokePts, r.shape);
    if (score < 0.5) continue;
    if (score > bestScore) { best = r; bestScore = score; }
  }
  return best;
}

// node(テスト)用エクスポート
if (typeof module !== "undefined" && module.exports) {
  module.exports = { screenToWorld, pointInShape, distToSeg, strokeHitScore, strokeHitsShape, pickRegion };
}

"use strict";


function polysToGeometry(faces) {
  const pos = [];
  for (const f of faces) for (let i = 1; i < f.length - 1; i++) pos.push(...f[0], ...f[i], ...f[i + 1]);
  const g = new THREE.BufferGeometry();
  g.setAttribute("position", new THREE.Float32BufferAttribute(pos, 3));
  g.computeVertexNormals();
  return g;
}

function polysToEdges(faces) {
  const pos = [];
  for (const f of faces) for (let i = 0; i < f.length; i++) pos.push(...f[i], ...f[(i + 1) % f.length]);
  const g = new THREE.BufferGeometry();
  g.setAttribute("position", new THREE.Float32BufferAttribute(pos, 3));
  return g;
}

function solidMat(color) {
  return new THREE.MeshStandardMaterial({ color, flatShading: true, side: THREE.DoubleSide, roughness: 0.9, metalness: 0 });
}

function makeLabel(text, opts = {}) {
  const { color = "#24354d", fontPx = 46, world = 1.3, weight = "bold" } = opts;
  const sp = new THREE.Sprite(new THREE.SpriteMaterial({ transparent: true, depthTest: false }));
  sp.userData = { color, fontPx, world, weight, text: null };
  setLabelText(sp, text);
  return sp;
}

function setLabelText(sp, text) {
  const u = sp.userData;
  if (u.text === text) return;
  u.text = text;
  const pad = 14;
  const cv = document.createElement("canvas");
  let ctx = cv.getContext("2d");
  const font = `${u.weight} ${u.fontPx}px "Hiragino Kaku Gothic ProN","Hiragino Sans","Yu Gothic",sans-serif`;
  ctx.font = font;
  const w = Math.ceil(ctx.measureText(text).width) + pad * 2;
  const h = u.fontPx + pad * 2;
  cv.width = w; cv.height = h;
  ctx = cv.getContext("2d");
  ctx.font = font;
  ctx.fillStyle = u.color;
  ctx.textBaseline = "middle";
  ctx.fillText(text, pad, h / 2 + 2);
  if (sp.material.map) sp.material.map.dispose();
  const tex = new THREE.CanvasTexture(cv);
  tex.minFilter = THREE.LinearFilter;
  sp.material.map = tex;
  sp.material.needsUpdate = true;
  sp.scale.set((u.world * w) / h, u.world, 1);
}

/* 寸法線: 辺(a-b)から dir 方向に dist だけ離した位置に
   引き出し線2本 + 平行線 + ラベル を描く */
function makeDim(scene, a, b, opts) {
  const dir = vNorm(opts.dir);
  const off = vScale(dir, opts.dist ?? 1.0);
  const a2 = vAdd(a, off), b2 = vAdd(b, off);
  const mat = new THREE.LineBasicMaterial({ color: opts.color ?? COL.edge, transparent: true, opacity: 1 });
  const pts = [V3(a), V3(a2), V3(b), V3(b2), V3(a2), V3(b2)];
  const lines = new THREE.LineSegments(new THREE.BufferGeometry().setFromPoints(pts), mat);
  const label = makeLabel(opts.text, { color: opts.labelColor ?? "#24354d", world: opts.world ?? 0.95 });
  const mid = vScale(vAdd(a2, b2), 0.5);
  const lp = vAdd(mid, vScale(dir, 0.6));
  label.position.set(lp[0], lp[1], lp[2]);
  scene.add(lines, label);
  return {
    setOpacity(o) {
      mat.opacity = o; lines.visible = o > 0.01;
      label.material.opacity = o; label.visible = o > 0.01;
    },
  };
}

function addLights(scene) {
  scene.add(new THREE.AmbientLight(0xffffff, 0.66));
  const d1 = new THREE.DirectionalLight(0xffffff, 0.62);
  d1.position.set(6, 12, 8);
  scene.add(d1);
  const d2 = new THREE.DirectionalLight(0xffffff, 0.22);
  d2.position.set(-8, 5, -9);
  scene.add(d2);
}

function makeGrid(scene, size, div, cx, cz) {
  const grid = new THREE.GridHelper(size, div, COL.gridA, COL.gridB);
  grid.position.set(cx, -0.02, cz);
  scene.add(grid);
}

function disposeScene(scene) {
  scene.traverse((o) => {
    if (o.geometry) o.geometry.dispose();
    if (o.material) {
      const ms = Array.isArray(o.material) ? o.material : [o.material];
      ms.forEach((m) => { if (m.map) m.map.dispose(); m.dispose(); });
    }
  });
}

const cubeFaceIdx = [
  [0,3,2,1],[4,5,6,7],[0,4,7,3],[1,2,6,5],[0,1,5,4],[3,7,6,2],
];
function boxVerts(x0, y0, z0, x1, y1, z1) {
  return [
    [x0,y0,z0],[x1,y0,z0],[x1,y1,z0],[x0,y1,z0],
    [x0,y0,z1],[x1,y0,z1],[x1,y1,z1],[x0,y1,z1],
  ];
}

// ==== 追加ヘルパー(面倒し・素材) ====
function dynQuad(scene, mat) {
  const geo = new THREE.BufferGeometry();
  geo.setAttribute("position", new THREE.Float32BufferAttribute(new Float32Array(12), 3));
  geo.setIndex([0,1,2,0,2,3]);
  const mesh = new THREE.Mesh(geo, mat);
  const lineGeo = new THREE.BufferGeometry();
  lineGeo.setAttribute("position", new THREE.Float32BufferAttribute(new Float32Array(15), 3));
  const line = new THREE.Line(lineGeo, new THREE.LineBasicMaterial({ color: COL.edge }));
  scene.add(mesh, line);
  return {
    set(p0, p1, p2, p3) {
      const pa = mesh.geometry.attributes.position;
      pa.setXYZ(0, ...p0); pa.setXYZ(1, ...p1); pa.setXYZ(2, ...p2); pa.setXYZ(3, ...p3);
      pa.needsUpdate = true;
      mesh.geometry.computeVertexNormals();
      const la = line.geometry.attributes.position;
      la.setXYZ(0, ...p0); la.setXYZ(1, ...p1); la.setXYZ(2, ...p2); la.setXYZ(3, ...p3); la.setXYZ(4, ...p0);
      la.needsUpdate = true;
    },
  };
}

function collectMats(group) {
  const mats = [];
  group.traverse((o) => {
    if (o.material) {
      const ms = Array.isArray(o.material) ? o.material : [o.material];
      ms.forEach((m) => { m.transparent = true; mats.push(m); });
    }
  });
  return mats;
}

function sectorPoly(r, a0, a1, n, y) {
  const pts = [[0, y, 0]];
  for (let i = 0; i <= n; i++) {
    const a = a0 + (i / n) * (a1 - a0);
    pts.push([r * Math.cos(a), y, r * Math.sin(a)]);
  }
  return pts;
}

function redOverlayMat(op = 0) {
  return new THREE.MeshBasicMaterial({ color: 0xe2574c, transparent: true, opacity: op, side: THREE.DoubleSide, depthWrite: false });
}

/* ===== src/render/canvas2d.js ===== */
// ==== 2D描画レイヤー(Canvas)。平面図形・速さのダイヤグラム・グラフ用 ====
"use strict";

/* 描画ヘルパー G:
   ワールド座標(問題の単位, 例: cm や 時間・距離)で図形を置くと、
   画面ピクセルへ変換して描く。3Dの「camPos/camTarget」に相当するのが view。

   view = { ox, oy, scale, yUp }
     ox, oy : ワールド原点(0,0)の画面ピクセル位置
     scale  : ワールド1単位 = 何ピクセル
     yUp    : true でy軸上向き(グラフ用)、false で下向き(画面と同じ)
   view はシナリオの状態(st.view)からも動かせる(ズーム・パン)。

   すべての座標はワールド単位。色は C2D(CSS文字列)を使う。 */
function makeG(ctx, screen, view) {
  const dpr = view.dpr || 1;
  const ox = view.ox, oy = view.oy, s = view.scale, yUp = !!view.yUp;
  const SX = (x) => ox + x * s;
  const SY = (y) => (yUp ? oy - y * s : oy + y * s);

  function stroke(color, w, dash, alpha) {
    ctx.strokeStyle = color || C2D.ink;
    ctx.lineWidth = (w || 1.5);
    ctx.globalAlpha = alpha == null ? 1 : alpha;
    ctx.setLineDash(dash || []);
  }
  function fillStyle(color, alpha) {
    ctx.fillStyle = color;
    ctx.globalAlpha = alpha == null ? 1 : alpha;
  }

  const G = {
    view,
    sx: SX, sy: SY,
    px: (x) => x * s, // ワールド長さ→ピクセル長さ

    clear() {
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      ctx.globalAlpha = 1;
      ctx.clearRect(0, 0, screen.w, screen.h);
    },

    // 方眼(ワールド範囲 [x0,x1]×[y0,y1] を step 刻み)
    grid(x0, y0, x1, y1, step, opts = {}) {
      const boldEvery = opts.boldEvery || 0;
      let n = 0;
      for (let x = x0; x <= x1 + 1e-9; x += step) {
        const bold = boldEvery && Math.round(x / step) % boldEvery === 0;
        stroke(bold ? C2D.gridBold : C2D.grid, bold ? 1.2 : 1, [], opts.alpha);
        ctx.beginPath(); ctx.moveTo(SX(x), SY(y0)); ctx.lineTo(SX(x), SY(y1)); ctx.stroke();
      }
      for (let y = y0; y <= y1 + 1e-9; y += step) {
        const bold = boldEvery && Math.round(y / step) % boldEvery === 0;
        stroke(bold ? C2D.gridBold : C2D.grid, bold ? 1.2 : 1, [], opts.alpha);
        ctx.beginPath(); ctx.moveTo(SX(x0), SY(y)); ctx.lineTo(SX(x1), SY(y)); ctx.stroke();
      }
      ctx.globalAlpha = 1;
    },

    line(x1, y1, x2, y2, opts = {}) {
      stroke(opts.color, opts.w, opts.dash, opts.alpha);
      ctx.beginPath(); ctx.moveTo(SX(x1), SY(y1)); ctx.lineTo(SX(x2), SY(y2)); ctx.stroke();
      ctx.globalAlpha = 1;
    },

    // 折れ線 / 経路。pts = [[x,y],...]
    path(pts, opts = {}) {
      if (pts.length < 2) return;
      stroke(opts.color, opts.w, opts.dash, opts.alpha);
      ctx.beginPath(); ctx.moveTo(SX(pts[0][0]), SY(pts[0][1]));
      for (let i = 1; i < pts.length; i++) ctx.lineTo(SX(pts[i][0]), SY(pts[i][1]));
      if (opts.close) ctx.closePath();
      ctx.stroke();
      ctx.globalAlpha = 1;
    },

    // 多角形。pts=[[x,y],...] fill/stroke両対応
    poly(pts, opts = {}) {
      if (pts.length < 2) return;
      ctx.beginPath(); ctx.moveTo(SX(pts[0][0]), SY(pts[0][1]));
      for (let i = 1; i < pts.length; i++) ctx.lineTo(SX(pts[i][0]), SY(pts[i][1]));
      ctx.closePath();
      if (opts.fill) { fillStyle(opts.fill, opts.fillAlpha); ctx.fill(); }
      if (opts.color !== null) { stroke(opts.color, opts.w, opts.dash, opts.alpha); ctx.stroke(); }
      ctx.globalAlpha = 1;
    },

    circle(x, y, r, opts = {}) {
      ctx.beginPath(); ctx.arc(SX(x), SY(y), r * s, 0, Math.PI * 2);
      if (opts.fill) { fillStyle(opts.fill, opts.fillAlpha); ctx.fill(); }
      if (opts.color !== null) { stroke(opts.color, opts.w, opts.dash, opts.alpha); ctx.stroke(); }
      ctx.globalAlpha = 1;
    },

    // 点(半径ピクセル固定の丸)。動点の表示に。
    dot(x, y, opts = {}) {
      const rp = opts.rp || 5;
      ctx.beginPath(); ctx.arc(SX(x), SY(y), rp, 0, Math.PI * 2);
      fillStyle(opts.color || C2D.red, opts.alpha);
      ctx.fill();
      if (opts.ring) { stroke("#fff", 2, [], opts.alpha); ctx.stroke(); }
      ctx.globalAlpha = 1;
    },

    // 円弧(角度は度、反時計まわり基準)。中心角・回転の表示に。
    arc(x, y, r, a0deg, a1deg, opts = {}) {
      const a0 = (-a0deg) * Math.PI / 180, a1 = (-a1deg) * Math.PI / 180;
      stroke(opts.color, opts.w, opts.dash, opts.alpha);
      ctx.beginPath(); ctx.arc(SX(x), SY(y), r * s, a0, a1, true); ctx.stroke();
      ctx.globalAlpha = 1;
    },

    // 矢印(始点→終点)
    arrow(x1, y1, x2, y2, opts = {}) {
      stroke(opts.color, opts.w, opts.dash, opts.alpha);
      const X1 = SX(x1), Y1 = SY(y1), X2 = SX(x2), Y2 = SY(y2);
      ctx.beginPath(); ctx.moveTo(X1, Y1); ctx.lineTo(X2, Y2); ctx.stroke();
      const ang = Math.atan2(Y2 - Y1, X2 - X1), hl = opts.head || 10;
      ctx.beginPath(); ctx.moveTo(X2, Y2);
      ctx.lineTo(X2 - hl * Math.cos(ang - 0.4), Y2 - hl * Math.sin(ang - 0.4));
      ctx.lineTo(X2 - hl * Math.cos(ang + 0.4), Y2 - hl * Math.sin(ang + 0.4));
      ctx.closePath(); fillStyle(opts.color || C2D.ink, opts.alpha); ctx.fill();
      ctx.globalAlpha = 1;
    },

    // 文字(ワールド位置に、ピクセルオフセット付き)
    text(x, y, str, opts = {}) {
      const size = opts.size || 15;
      ctx.font = `${opts.weight || "bold"} ${size}px "Hiragino Kaku Gothic ProN","Hiragino Sans","Yu Gothic",sans-serif`;
      ctx.textAlign = opts.align || "center";
      ctx.textBaseline = opts.baseline || "middle";
      fillStyle(opts.color || C2D.ink, opts.alpha);
      ctx.fillText(str, SX(x) + (opts.dx || 0), SY(y) + (opts.dy || 0));
      ctx.globalAlpha = 1;
    },

    // ラベル付きバッジ(動点の名前など。背景付きで見やすく)
    badge(x, y, str, opts = {}) {
      const size = opts.size || 13, padx = 6, pady = 3;
      ctx.font = `bold ${size}px "Hiragino Kaku Gothic ProN",sans-serif`;
      const w = ctx.measureText(str).width;
      const X = SX(x) + (opts.dx || 0), Y = SY(y) + (opts.dy || 0);
      fillStyle(opts.bg || C2D.red, opts.alpha);
      const bw = w + padx * 2, bh = size + pady * 2;
      ctx.beginPath();
      const rr = 5, bx = X - bw / 2, by = Y - bh / 2;
      ctx.moveTo(bx + rr, by);
      ctx.arcTo(bx + bw, by, bx + bw, by + bh, rr);
      ctx.arcTo(bx + bw, by + bh, bx, by + bh, rr);
      ctx.arcTo(bx, by + bh, bx, by, rr);
      ctx.arcTo(bx, by, bx + bw, by, rr);
      ctx.fill();
      ctx.textAlign = "center"; ctx.textBaseline = "middle";
      fillStyle(opts.fg || "#fff", opts.alpha);
      ctx.fillText(str, X, Y + 0.5);
      ctx.globalAlpha = 1;
    },
  };
  return G;
}

// region の shape(rect/poly/seg)を赤い点線で強調表示する(quizのなぞりフィードバック)
function drawRegionHighlight(g, shape, alpha) {
  const opts = { color: C2D.red, w: 3, dash: [7, 5], alpha };
  if (shape.kind === "rect") {
    g.poly([[shape.x, shape.y], [shape.x + shape.w, shape.y],
            [shape.x + shape.w, shape.y + shape.h], [shape.x, shape.y + shape.h]],
      { ...opts, fill: C2D.redFill, fillAlpha: alpha * 0.5 });
  } else if (shape.kind === "poly") {
    g.poly(shape.pts, { ...opts, fill: C2D.redFill, fillAlpha: alpha * 0.5 });
  } else if (shape.kind === "seg") {
    g.line(shape.a[0], shape.a[1], shape.b[0], shape.b[1], opts);
  }
}

/* 2Dバックエンド: <canvas> を用意し、毎フレーム clear→draw する */
function makeCanvas2DBackend(stageEl) {
  const canvas = document.createElement("canvas");
  canvas.style.display = "block";
  canvas.style.width = "100%";
  canvas.style.height = "100%";
  stageEl.appendChild(canvas);
  const ctx = canvas.getContext("2d");
  const screen = { w: 0, h: 0 };
  let dpr = 1;

  function resize() {
    dpr = Math.min(window.devicePixelRatio || 1, 2);
    screen.w = stageEl.clientWidth;
    screen.h = stageEl.clientHeight;
    canvas.width = screen.w * dpr;
    canvas.height = screen.h * dpr;
  }

  return {
    kind: "canvas2d",
    canvas,
    show(v) { canvas.style.display = v ? "block" : "none"; },
    resize,
    load(scn, builders) {
      const handle = builders[scn.type](scn.params);
      return { handle };
    },
    frame(bctx, st, overlay) {
      // 既定ビュー: シナリオの base.view を状態として補間したもの(st.view)を使う。
      // なければ画面中央・スケール1。
      const v = st.view || { ox: screen.w / 2, oy: screen.h / 2, scale: 24, yUp: false };
      const view = {
        ox: v.ox != null ? v.ox : screen.w / 2,
        oy: v.oy != null ? v.oy : screen.h / 2,
        scale: v.scale != null ? v.scale : 24,
        yUp: !!v.yUp, dpr,
      };
      const g = makeG(ctx, screen, view);
      g.clear();
      bctx.handle.draw(g, st, screen);
      // quizモード: なぞられた region のハイライト(ビルダー非依存の上書き描画)
      if (overlay && overlay.shape && overlay.alpha > 0.01) {
        drawRegionHighlight(g, overlay.shape, overlay.alpha);
      }
      bctx.lastView = view; // 入力(画面→ワールド変換)用に公開
    },
    dispose() {},
  };
}


/* ===== src/render/backend-three.js ===== */
// ==== 3Dバックエンド(Three.js)。2Dと同じインターフェースに包む ====
"use strict";

function makeThreeBackend(stageEl) {
  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setClearColor(0xfbfcfd);
  renderer.domElement.style.display = "block";
  stageEl.appendChild(renderer.domElement);
  const camera = new THREE.PerspectiveCamera(42, 1, 0.1, 300);

  function resize() {
    const w = stageEl.clientWidth, h = stageEl.clientHeight;
    renderer.setSize(w, h);
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
  }

  return {
    kind: "three",
    show(v) { renderer.domElement.style.display = v ? "block" : "none"; },
    resize,
    load(scn, builders) {
      const scene = new THREE.Scene();
      addLights(scene);
      const handle = builders[scn.type](scene, scn.params);
      return { scene, handle };
    },
    frame(bctx, st) {
      camera.position.set(...st.camPos);
      camera.lookAt(...st.camTarget);
      bctx.handle.update(st);
      renderer.render(bctx.scene, camera);
    },
    dispose(bctx) {
      if (bctx && bctx.scene) disposeScene(bctx.scene);
    },
  };
}


/* ===== src/units/cases/builders/treeDiagram.js ===== */
// ==== ビルダー(2D): 樹形図(カードのならべ方) ====
// n枚のカードを1列にならべる順列を、枝が1段ずつ育つ樹形図で数える。
// 状態 st.grow(0..n)で「何段目まで枝がのびたか」、st.countN で葉を数える。
//
// params: { items: ["1","2","3"] }  カードの文字
function buildTreeDiagram(params) {
  const items = params.items;
  const n = items.length;

  // 順列を列挙(枝の順=辞書順)。各ノードは「これまでに選んだ列」
  const perms = [];
  (function rec(prefix, rest) {
    if (rest.length === 0) { perms.push(prefix); return; }
    for (let i = 0; i < rest.length; i++) {
      rec(prefix.concat(rest[i]), rest.slice(0, i).concat(rest.slice(i + 1)));
    }
  })([], items);
  const leavesN = perms.length;

  // ノード位置: 深さℓ(1..n) → x=(ℓ-1)*colW。yは「自分の下の葉たち」の平均。
  const colW = 2.4, rowH = 1.0;
  const leafY = (j) => (leavesN - 1 - j) * rowH;
  function nodeInfo(depth) {
    // 深さdepthの全ノード: prefix(長さdepth)ごとに、対応する葉の範囲
    const map = new Map();
    perms.forEach((p, j) => {
      const key = p.slice(0, depth).join(",");
      if (!map.has(key)) map.set(key, { label: p[depth - 1], ys: [] });
      map.get(key).ys.push(leafY(j));
    });
    return [...map.values()].map((v) => ({
      label: v.label,
      x: (depth - 1) * colW,
      y: v.ys.reduce((a, b) => a + b, 0) / v.ys.length,
      childYs: v.ys,
    }));
  }
  const levels = [];
  for (let d = 1; d <= n; d++) levels.push(nodeInfo(d));

  return {
    draw(g, st, screen) {
      const grow = st.grow;
      const digits = ["百の位", "十の位", "一の位", "千の位"]; // n<=3想定(4枚なら要調整)
      const topY = leavesN * rowH + 0.6;

      // 列見出し
      for (let d = 1; d <= n; d++) {
        const f = clamp01(grow - (d - 1));
        if (f < 0.01) continue;
        g.text((d - 1) * colW, topY, digits[d - 1], { size: 12, color: C2D.axis, alpha: f });
      }

      // 枝と数字(深さdの枝は grow が d-1..d の間にのびる)
      for (let d = 1; d <= n; d++) {
        const f = clamp01(grow - (d - 1));
        if (f < 0.01) continue;
        const parents = d >= 2 ? levels[d - 2] : null;
        levels[d - 1].forEach((node) => {
          if (d >= 2) {
            // 親ノードから自分へ枝をのばす(fで途中まで)
            const pa = parents.find((p) => p.childYs.includes(node.childYs[0]));
            const x0 = pa.x + 0.42, y0 = pa.y;
            const x1 = node.x - 0.42, y1 = node.y;
            g.line(x0, y0, x0 + (x1 - x0) * f, y0 + (y1 - y0) * f, { color: C2D.edge, w: 1.5, alpha: 0.9 });
          }
          if (f > 0.6) {
            g.text(node.x, node.y, node.label, { size: 17, color: C2D.ink, alpha: (f - 0.6) / 0.4 });
          }
        });
      }

      // 葉のよこに完成した数と番号バッジ
      perms.forEach((p, j) => {
        const showNum = clamp01(grow - (n - 1));
        if (showNum > 0.6) {
          g.text((n - 1) * colW + 1.5, leafY(j), `→ ${p.join("")}`, {
            size: 14, color: C2D.ink, alpha: (showNum - 0.6) / 0.4, align: "left",
          });
        }
        const cf = clamp01((st.countN || 0) - j);
        if (cf > 0.5) {
          g.badge((n - 1) * colW + 3.4, leafY(j), `${j + 1}`, { bg: C2D.red, size: 12 });
        }
      });

      // 合計
      if ((st.countN || 0) >= leavesN - 0.01 && st.showAns > 0.01) {
        g.text((n - 1) * colW + 1.4, -1.2, `全部で ${leavesN} 通り`, {
          size: 18, color: C2D.red, alpha: st.showAns,
        });
      }
    },
  };
}

// ==== ビルダー(2D): 点の移動と面積 ====
// 長方形ABCDの周上を点Pが A→B→C→D と動く。三角形ABPの面積が
// どう変わるかを、図形の塗りとグラフで同時に見せる。
//
// params: { w, h }  長方形の横w・縦h。頂点 A(0,0) B(w,0) C(w,h) D(0,h)
//   Pは A→B→C→D の順に周を進む(辺AD上は面積0付近なので今回はA→B→C→Dで一周手前まで)
function buildMovePoint(params) {
  const { w, h } = params;
  const A = [0, 0], B = [w, 0], C = [w, h], D = [0, h];
  // 周の道のり: A→B(長さw) →B→C(長さh) →C→D(長さw)。合計 2w+h
  const total = w + h + w;
  function P(dparam) {           // dparam: 0..total
    if (dparam <= w) return [dparam, 0];                     // AB
    if (dparam <= w + h) return [w, dparam - w];             // BC
    return [w - (dparam - w - h), h];                        // CD
  }
  // 三角形ABPの面積 = AB(=w) × (Pの底辺ABからの高さ) ÷ 2 = w × Py ÷ 2
  function area(dparam) { return w * P(dparam)[1] / 2; }
  const areaMax = w * h / 2;

  return {
    draw(g, st, screen) {
      const d = st.d * total;          // Pの現在位置(道のり)
      const p = P(d);

      // --- 左: 長方形と三角形 ---
      // 長方形
      g.poly([A, B, C, D], { color: C2D.edge, w: 2.5, fill: C2D.solid, fillAlpha: 1 });
      // 三角形ABP(塗り)
      if (st.showTri > 0.01) {
        g.poly([A, B, p], { color: C2D.red, w: 2, fill: C2D.redFill, fillAlpha: 1, alpha: st.showTri });
        // 高さの点線
        g.line(p[0], p[1], p[0], 0, { color: C2D.ghost, dash: [4, 4], w: 1, alpha: st.showTri });
      }
      // 頂点ラベル
      g.text(A[0], A[1], "A", { dx: -12, dy: 12, color: C2D.ink });
      g.text(B[0], B[1], "B", { dx: 12, dy: 12, color: C2D.ink });
      g.text(C[0], C[1], "C", { dx: 12, dy: -12, color: C2D.ink });
      g.text(D[0], D[1], "D", { dx: -12, dy: -12, color: C2D.ink });
      // 動点P
      g.dot(p[0], p[1], { color: C2D.red, rp: 7, ring: true });
      g.badge(p[0], p[1], "P", { dx: 14, dy: -12, bg: C2D.red });

      // --- 右: 面積グラフ(横=道のり / 縦=面積) ---
      if (st.showGraph > 0.01) {
        const gx0 = st.gx0, gy0 = st.gy0, sx = st.gsx, sy = st.gsy;
        // 軸
        g.arrow(gx0, gy0, gx0 + total * sx + 0.8, gy0, { color: C2D.axis, w: 1.5, head: 9 });
        g.arrow(gx0, gy0, gx0, gy0 + areaMax * sy + 1.2, { color: C2D.axis, w: 1.5, head: 9, });
        g.text(gx0 + total * sx + 0.8, gy0, "動いた長さ", { dx: 4, dy: 12, align: "left", color: C2D.axis, size: 11 });
        g.text(gx0, gy0 + areaMax * sy + 1.2, "面積", { dy: -10, color: C2D.axis, size: 11 });
        // 区切り(B,C の位置)
        [w, w + h].forEach((dd) => {
          g.line(gx0 + dd * sx, gy0, gx0 + dd * sx, gy0 + areaMax * sy, { color: C2D.grid, w: 1 });
        });
        g.text(gx0 + w * sx, gy0, "B", { dy: 14, size: 11, color: C2D.axis });
        g.text(gx0 + (w + h) * sx, gy0, "C", { dy: 14, size: 11, color: C2D.axis });
        // 面積の折れ線(0..d)
        const pts = [];
        const NS = 60;
        for (let i = 0; i <= NS; i++) {
          const dd = (i / NS) * d;
          pts.push([gx0 + dd * sx, gy0 + area(dd) * sy]);
        }
        g.path(pts, { color: C2D.red, w: 2.5, alpha: st.showGraph });
        // 現在の面積の点
        g.dot(gx0 + d * sx, gy0 + area(d) * sy, { color: C2D.red, rp: 5, alpha: st.showGraph });
        // 面積の値
        g.text(gx0 + d * sx, gy0 + area(d) * sy, `${area(d).toFixed(0)}cm²`, { dx: 6, dy: -12, align: "left", size: 12, color: C2D.red, alpha: st.showGraph });
      }
    },
  };
}

// ==== ビルダー(2D): 図形の転がり(正方形) ====
// 1辺aの正方形が直線上をすべらずに転がる。90度ごとに回転中心が
// 右どなりの頂点へ移り、頂点Aは半径のちがう1/4円弧をつないだ軌跡をえがく。
//
// params: { a }  正方形の1辺(cm)
function buildRolling(params) {
  const a = params.a;
  const SQ0 = [[0, 0], [a, 0], [a, a], [0, a]]; // 初期の正方形(Aは[0,0])

  // 点pを中心cのまわりに deg 度回転(反時計回りが正)
  function rotAround(p, c, deg) {
    const r = deg * Math.PI / 180;
    const dx = p[0] - c[0], dy = p[1] - c[1];
    return [c[0] + dx * Math.cos(r) - dy * Math.sin(r),
            c[1] + dx * Math.sin(r) + dy * Math.cos(r)];
  }
  // 合計回転角 theta(0..270度)での点の位置。90度ごとに中心が右へ移る。
  function transform(p, theta) {
    let k = Math.min(2, Math.floor(theta / 90)); // 何回転り終えたか
    const phi = theta - 90 * k;                  // いまの回転の進み
    let q = p;
    for (let j = 0; j < k; j++) q = rotAround(q, [(j + 1) * a, 0], -90);
    return rotAround(q, [(k + 1) * a, 0], -phi);
  }

  return {
    draw(g, st, screen) {
      const theta = st.rot;
      const k = Math.min(2, Math.floor(theta / 90));
      const pivot = [(k + 1) * a, 0];

      // --- 地面 ---
      g.line(-1, 0, 4 * a + 1.5, 0, { color: C2D.edge, w: 2.5 });

      // --- Aの軌跡(0..theta をサンプリング) ---
      const NS = 80;
      const pathPts = [];
      for (let i = 0; i <= NS; i++) pathPts.push(transform(SQ0[0], (i / NS) * theta));

      // 軌跡と直線で囲まれた面積
      if (st.showArea > 0.01 && theta > 1) {
        const region = pathPts.slice();
        region.push([pathPts[pathPts.length - 1][0], 0], [pathPts[0][0], 0]);
        g.poly(region, { color: null, fill: C2D.redFill, fillAlpha: st.showArea });
      }
      if (theta > 0.5) g.path(pathPts, { color: C2D.red, w: 2.5 });

      // --- 正方形(いまの位置) ---
      const sq = SQ0.map((p) => transform(p, theta));
      g.poly(sq, { color: C2D.edge, w: 2.5, fill: C2D.solid, fillAlpha: 0.9 });

      // --- 回転中心と半径 ---
      if (st.showRadius > 0.01 && theta > 0.5 && theta < 269.5) {
        const al = st.showRadius;
        g.dot(pivot[0], pivot[1], { color: C2D.ink, rp: 5, alpha: al });
        g.line(pivot[0], pivot[1], sq[0][0], sq[0][1], { color: C2D.red, w: 1.5, dash: [5, 4], alpha: al });
      }

      // --- 頂点A ---
      g.dot(sq[0][0], sq[0][1], { color: C2D.red, rp: 7, ring: true });
      g.badge(sq[0][0], sq[0][1], "A", { dy: -20, bg: C2D.red });
    },
  };
}

// ==== ビルダー: cone ====
function buildCone(scene, params) {
  const { r, l } = params;
  const NU = 64, NV = 8;
  const Theta = 2 * Math.PI * r / l;

  makeGrid(scene, 34, 17, 4, 0);

  // 側面 (パラメトリックメッシュ: 円すい→扇形へ連続変形)
  const nVert = (NU + 1) * (NV + 1);
  const posArr = new Float32Array(nVert * 3);
  const idx = [];
  for (let iu = 0; iu < NU; iu++) for (let iv = 0; iv < NV; iv++) {
    const a = iu * (NV + 1) + iv, b = a + (NV + 1);
    idx.push(a, b, a + 1, b, b + 1, a + 1);
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute("position", new THREE.BufferAttribute(posArr, 3));
  geo.setIndex(idx);
  const lateral = new THREE.Mesh(geo, solidMat(COL.solid));
  scene.add(lateral);

  // 切り込み線(赤・2本) と 弧(ふち)
  const seams = [0, NU].map(() => {
    const g = new THREE.BufferGeometry();
    g.setAttribute("position", new THREE.Float32BufferAttribute(new Float32Array((NV + 1) * 3), 3));
    const line = new THREE.Line(g, new THREE.LineBasicMaterial({ color: COL.red }));
    scene.add(line);
    return line;
  });
  const rimGeo = new THREE.BufferGeometry();
  rimGeo.setAttribute("position", new THREE.Float32BufferAttribute(new Float32Array((NU + 1) * 3), 3));
  const rimMat = new THREE.LineBasicMaterial({ color: COL.edge });
  scene.add(new THREE.Line(rimGeo, rimMat));
  const rim = { geo: rimGeo };

  // 円板+輪郭を作る小ヘルパー
  function makeDisk(cx, cz) {
    const disk = new THREE.Mesh(
      new THREE.CircleGeometry(r, 48),
      new THREE.MeshBasicMaterial({ color: 0xcfd8e0, transparent: true, opacity: 0, side: THREE.DoubleSide, depthWrite: false })
    );
    disk.rotation.x = -Math.PI / 2;
    disk.position.set(cx, 0.012, cz);
    scene.add(disk);
    const pts = [];
    for (let i = 0; i <= 60; i++) {
      const a = (i / 60) * Math.PI * 2;
      pts.push(new THREE.Vector3(cx + r * Math.cos(a), 0.03, cz + r * Math.sin(a)));
    }
    const ringMat = new THREE.LineBasicMaterial({ color: COL.edge, transparent: true, opacity: 0 });
    scene.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts), ringMat));
    return { disk, ringMat };
  }
  // 円すいの底面(中央) / 展開図の底面(弧に接する位置: 中心 = (l+r, 0, 0))
  const baseC = makeDisk(0, 0);
  const baseN = makeDisk(l + r, 0);
  const touchDot = new THREE.Mesh(
    new THREE.SphereGeometry(0.18, 16, 12),
    new THREE.MeshBasicMaterial({ color: COL.red, transparent: true, opacity: 0 })
  );
  touchDot.position.set(l, 0.1, 0);
  scene.add(touchDot);

  // 中心角の弧 + ラベル
  const arcPts = [];
  for (let i = 0; i <= 40; i++) {
    const a = -Theta / 2 + (i / 40) * Theta;
    arcPts.push(new THREE.Vector3(2.6 * Math.cos(a), 0.05, 2.6 * Math.sin(a)));
  }
  const arcMat = new THREE.LineBasicMaterial({ color: COL.red, transparent: true, opacity: 0 });
  scene.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(arcPts), arcMat));
  const angleLb = makeLabel("144°", { color: "#b03a30", world: 1.5 });
  angleLb.position.set(1.1, 0.5, 0);
  angleLb.material.opacity = 0;
  scene.add(angleLb);

  const cEdge = new THREE.Color(COL.edge), cRed = new THREE.Color(COL.red);

  return {
    update(st) {
      const R = r + (l - r) * st.t;
      const psi = 2 * Math.PI * r / R;
      const h = Math.sqrt(Math.max(l * l - R * R, 0));
      for (let iu = 0; iu <= NU; iu++) {
        const ang = -psi / 2 + (iu / NU) * psi;
        const rx = R * Math.cos(ang), rz = R * Math.sin(ang);
        for (let iv = 0; iv <= NV; iv++) {
          const f = iv / NV;
          const n = iu * (NV + 1) + iv;
          posArr[n*3] = rx * f;
          posArr[n*3+1] = h * (1 - f);
          posArr[n*3+2] = rz * f;
        }
      }
      geo.attributes.position.needsUpdate = true;
      geo.computeVertexNormals();
      [0, NU].forEach((iu, si) => {
        const pa = seams[si].geometry.attributes.position;
        for (let iv = 0; iv <= NV; iv++) {
          const n = iu * (NV + 1) + iv;
          pa.setXYZ(iv, posArr[n*3], posArr[n*3+1] + 0.015, posArr[n*3+2]);
        }
        pa.needsUpdate = true;
      });
      const ra = rim.geo.attributes.position;
      for (let iu = 0; iu <= NU; iu++) {
        const n = iu * (NV + 1) + NV;
        ra.setXYZ(iu, posArr[n*3], posArr[n*3+1] + 0.015, posArr[n*3+2]);
      }
      ra.needsUpdate = true;
      rimMat.color.copy(cEdge).lerp(cRed, st.rimHi);
      // 円すいの底面(中央)はフェードアウト、展開図の底面は弧に接して現れる
      baseC.disk.material.opacity = st.baseOp * 0.4;
      baseC.ringMat.opacity = st.baseOp;
      baseN.disk.material.opacity = st.netOp * 0.4;
      baseN.ringMat.opacity = st.netOp;
      baseN.ringMat.color.copy(cEdge).lerp(cRed, st.netHi);
      touchDot.material.opacity = st.netHi;
      arcMat.opacity = st.angleOp;
      angleLb.material.opacity = st.angleOp;
      angleLb.visible = st.angleOp > 0.01;
    },
  };
}

/* ===== src/units/geometry-solid/builders/cubeNet.js ===== */
// ==== ビルダー: cubeNet(立方体の展開図) ====
// 立方体の6面を「ヒンジの木」でつないで展開する。面によっては
// 親の面(例: 十字型のふた→前面)にぶら下がり、2段階で回転する。
// params.net: "cross"(十字型) / "stairs"(階段型)
function buildCubeNet(scene, params) {
  const h = params.size / 2;
  makeGrid(scene, 44, 22, 0, 0);

  // 面の頂点(閉じた状態)。bottomは固定。
  const F = {
    bottom: [[-h, 0, -h], [h, 0, -h], [h, 0, h], [-h, 0, h]],
    front:  [[-h, 0, h], [h, 0, h], [h, 2 * h, h], [-h, 2 * h, h]],
    back:   [[h, 0, -h], [-h, 0, -h], [-h, 2 * h, -h], [h, 2 * h, -h]],
    right:  [[h, 0, h], [h, 0, -h], [h, 2 * h, -h], [h, 2 * h, h]],
    left:   [[-h, 0, -h], [-h, 0, h], [-h, 2 * h, h], [-h, 2 * h, -h]],
    top:    [[-h, 2 * h, -h], [h, 2 * h, -h], [h, 2 * h, h], [-h, 2 * h, h]],
  };
  // ヒンジ木: face → { parent(nullなら底面に直結), anchor, axis, angle(度) }
  const NETS = {
    cross: {
      front: { parent: null,    anchor: [0, 0, h],      axis: [1, 0, 0], angle: 90 },
      back:  { parent: null,    anchor: [0, 0, -h],     axis: [1, 0, 0], angle: -90 },
      right: { parent: null,    anchor: [h, 0, 0],      axis: [0, 0, 1], angle: -90 },
      left:  { parent: null,    anchor: [-h, 0, 0],     axis: [0, 0, 1], angle: 90 },
      top:   { parent: "front", anchor: [0, 2 * h, h],  axis: [1, 0, 0], angle: 90 },
    },
    stairs: {
      front: { parent: null,    anchor: [0, 0, h],      axis: [1, 0, 0], angle: 90 },
      left:  { parent: "front", anchor: [-h, 0, h],     axis: [0, 1, 0], angle: 90 },
      right: { parent: null,    anchor: [h, 0, 0],      axis: [0, 0, 1], angle: -90 },
      back:  { parent: "right", anchor: [h, 0, -h],     axis: [0, 1, 0], angle: -90 },
      top:   { parent: "back",  anchor: [0, 2 * h, -h], axis: [1, 0, 0], angle: -90 },
    },
  };
  const net = NETS[params.net];

  // 底面(固定)。ふた(top)はピンクにして行き先を追えるように。
  scene.add(new THREE.Mesh(polysToGeometry([F.bottom.map((p) => [p[0], p[1] + 0.004, p[2]])]), solidMat(COL.solid2)));
  scene.add(new THREE.LineSegments(polysToEdges([F.bottom]), new THREE.LineBasicMaterial({ color: COL.edge })));

  const quads = {};
  for (const name of Object.keys(net)) {
    quads[name] = dynQuad(scene, solidMat(name === "top" ? COL.cap : COL.solid));
  }

  // 面nameの頂点を、展開の進み t(0..1) で計算(自分→親→…の順にヒンジ回転)
  function faceVertsAt(name, t) {
    const chain = [];
    for (let cur = name; cur && net[cur]; cur = net[cur].parent) chain.push(net[cur]);
    return F[name].map((v) => {
      let p = v;
      for (const hg of chain) p = rotAxis(p, hg.anchor, hg.axis, hg.angle * Math.PI / 180 * t);
      return p;
    });
  }

  return {
    update(st) {
      for (const name of Object.keys(net)) {
        const vs = faceVertsAt(name, st.t);
        quads[name].set(vs[0], vs[1], vs[2], vs[3]);
      }
    },
  };
}


/* ===== src/units/geometry-solid/builders/cut.js ===== */
// ==== ビルダー: cut ====
function buildCut(scene, params) {
  const S = params.size;
  const verts = boxVerts(0, 0, 0, S, S, S);
  const plane = { n: [1,1,1], d: 1.5 * S };
  const nhat = V3(vNorm(plane.n));
  const { below, above, cap } = splitPolyhedron(verts, cubeFaceIdx, plane);

  const gBelow = new THREE.Group();
  const gAbove = new THREE.Group();
  scene.add(gBelow, gAbove);

  const edgeMat = new THREE.LineBasicMaterial({ color: COL.edge });
  gBelow.add(new THREE.Mesh(polysToGeometry(below), solidMat(COL.solid)));
  gAbove.add(new THREE.Mesh(polysToGeometry(above), solidMat(COL.solid2)));
  const capMeshB = new THREE.Mesh(polysToGeometry([cap]), solidMat(COL.cap));
  const capMeshA = new THREE.Mesh(polysToGeometry([[...cap].reverse()]), solidMat(COL.cap));
  gBelow.add(capMeshB); gAbove.add(capMeshA);
  gBelow.add(new THREE.LineSegments(polysToEdges([...below, cap]), edgeMat));
  gAbove.add(new THREE.LineSegments(polysToEdges([...above, cap]), edgeMat));

  const ringPts = cap.map((p) => V3(p).add(nhat.clone().multiplyScalar(0.04)));
  const ringMat = new THREE.LineBasicMaterial({ color: COL.red, transparent: true, opacity: 0 });
  gBelow.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints([...ringPts, ringPts[0]]), ringMat));

  const planeMesh = new THREE.Mesh(
    new THREE.CircleGeometry(S * 1.05, 48),
    new THREE.MeshBasicMaterial({ color: 0xe2574c, transparent: true, opacity: 0, side: THREE.DoubleSide, depthWrite: false })
  );
  planeMesh.position.set(S/2, S/2, S/2);
  planeMesh.quaternion.setFromUnitVectors(new THREE.Vector3(0,0,1), nhat);
  scene.add(planeMesh);

  const hex = params.hexPts;
  const segs = [];
  for (let i = 0; i < 6; i++) {
    const p1 = hex[i], p2 = hex[(i+1)%6];
    let off = [0,0,0];
    for (let k = 0; k < 3; k++) {
      if (Math.abs(p1[k]-p2[k]) < 1e-9 && (Math.abs(p1[k]) < 1e-9 || Math.abs(p1[k]-S) < 1e-9)) {
        off[k] = p1[k] < 1e-9 ? -0.04 : 0.04;
      }
    }
    const line = new THREE.Line(
      new THREE.BufferGeometry().setFromPoints([V3(vAdd(p1, off)), V3(vAdd(p2, off))]),
      new THREE.LineBasicMaterial({ color: COL.red, transparent: true, opacity: 0 })
    );
    scene.add(line);
    segs.push(line);
  }

  const dots = params.dotIdx.map((i) => {
    const d = new THREE.Mesh(
      new THREE.SphereGeometry(0.24, 20, 14),
      new THREE.MeshStandardMaterial({ color: COL.red, roughness: 0.5 })
    );
    d.position.copy(V3(hex[i]));
    d.scale.setScalar(0.001);
    scene.add(d);
    return d;
  });

  makeGrid(scene, 30, 15, S/2, S/2);
  const aside = V3(vNorm([1,-1,0]));

  return {
    update(st) {
      gBelow.position.copy(nhat.clone().multiplyScalar(-st.sep));
      gAbove.position.copy(nhat.clone().multiplyScalar(st.sep).add(aside.clone().multiplyScalar(st.aside)));
      const capsOn = st.sep > 0.03;
      capMeshB.visible = capsOn; capMeshA.visible = capsOn;
      planeMesh.material.opacity = st.planeOp;
      planeMesh.visible = st.planeOp > 0.01;
      dots.forEach((d) => d.scale.setScalar(Math.max(0.001, st.dots)));
      segs.forEach((s, i) => {
        const o = clamp01(st.cutDraw * 6 - i) * st.lineOp;
        s.material.opacity = o;
        s.visible = o > 0.01;
      });
      ringMat.opacity = st.ring;
    },
  };
}

// ビルダー②: 積み木の切断 (3x3x3を3頂点で切る)

/* ===== src/units/geometry-solid/builders/cutBlocks.js ===== */
// ==== ビルダー: cutBlocks ====
function buildCutBlocks(scene, params) {
  const s = params.unit, N = 3, D = N * s;
  const plane = { n: [1,1,1], d: D };
  const nhat = V3(vNorm(plane.n));
  const edgeMat = new THREE.LineBasicMaterial({ color: COL.edge });
  const cBase = new THREE.Color(COL.solid);
  const cBodyHi = new THREE.Color(0xf3d3cf);
  const cCapHi = new THREE.Color(0xe2574c);
  const sharedMat = solidMat(COL.solid);

  makeGrid(scene, 40, 20, D/2, D/2);

  const minis = [];
  for (let i = 0; i < N; i++) for (let j = 0; j < N; j++) for (let k = 0; k < N; k++) {
    const verts = boxVerts(i*s, j*s, k*s, (i+1)*s, (j+1)*s, (k+1)*s);
    const minSum = (i + j + k) * s;
    const cut = minSum < plane.d - 1e-9 && minSum + 3 * s > plane.d + 1e-9;
    const g = new THREE.Group();
    scene.add(g);
    const mini = { g, j, cut, grpBelow: null, bodyMats: [], capMats: [] };
    if (cut) {
      const { below, above, cap } = splitPolyhedron(verts, cubeFaceIdx, plane);
      const mBody1 = solidMat(COL.solid), mBody2 = solidMat(COL.solid);
      const mCap1 = solidMat(COL.solid), mCap2 = solidMat(COL.solid);
      const gb = new THREE.Group(), ga = new THREE.Group();
      const capB = new THREE.Mesh(polysToGeometry([cap]), mCap1);
      capB.position.copy(nhat.clone().multiplyScalar(-0.015));
      const capA = new THREE.Mesh(polysToGeometry([[...cap].reverse()]), mCap2);
      capA.position.copy(nhat.clone().multiplyScalar(0.015));
      gb.add(new THREE.Mesh(polysToGeometry(below), mBody1), capB);
      gb.add(new THREE.LineSegments(polysToEdges([...below, cap]), edgeMat));
      ga.add(new THREE.Mesh(polysToGeometry(above), mBody2), capA);
      ga.add(new THREE.LineSegments(polysToEdges([...above, cap]), edgeMat));
      g.add(gb, ga);
      mini.grpBelow = gb;
      mini.bodyMats = [mBody1, mBody2];
      mini.capMats = [mCap1, mCap2];
    } else {
      const facePolys = cubeFaceIdx.map((f) => f.map((vi) => verts[vi]));
      const sub = new THREE.Group();
      sub.add(new THREE.Mesh(polysToGeometry(facePolys), sharedMat));
      sub.add(new THREE.LineSegments(polysToEdges(facePolys), edgeMat));
      g.add(sub);
      if (minSum + 3 * s <= plane.d + 1e-9) mini.grpBelow = sub; // 完全に切り口の下側
    }
    minis.push(mini);
  }

  // 3頂点マーカー
  const dotPts = [[D,0,0],[0,D,0],[0,0,D]];
  const dots = dotPts.map((p) => {
    const d = new THREE.Mesh(
      new THREE.SphereGeometry(0.26, 20, 14),
      new THREE.MeshStandardMaterial({ color: COL.red, roughness: 0.5 })
    );
    d.position.copy(V3(p));
    d.scale.setScalar(0.001);
    scene.add(d);
    return d;
  });

  const planeMesh = new THREE.Mesh(
    new THREE.CircleGeometry(D * 0.95, 48),
    new THREE.MeshBasicMaterial({ color: 0xe2574c, transparent: true, opacity: 0, side: THREE.DoubleSide, depthWrite: false })
  );
  planeMesh.position.set(D/3, D/3, D/3);
  planeMesh.quaternion.setFromUnitVectors(new THREE.Vector3(0,0,1), nhat);
  scene.add(planeMesh);

  // 段ごとの個数ラベル
  const counts = params.layerCounts.map((c) => {
    const lb = makeLabel(`${c}個`, { color: "#b03a30", world: 1.5 });
    lb.material.opacity = 0;
    scene.add(lb);
    return lb;
  });

  return {
    update(st) {
      for (const m of minis) {
        m.g.position.set(m.j * params.spread * st.explode, m.j * params.liftGap * st.lift, 0);
        if (m.grpBelow) m.grpBelow.position.copy(nhat.clone().multiplyScalar(-st.sep));
        if (m.cut) {
          m.bodyMats.forEach((mat) => mat.color.copy(cBase).lerp(cBodyHi, st.highlight));
          m.capMats.forEach((mat) => mat.color.copy(cBase).lerp(cCapHi, st.highlight));
        }
      }
      dots.forEach((d) => d.scale.setScalar(Math.max(0.001, st.dots)));
      planeMesh.material.opacity = st.planeOp;
      planeMesh.visible = st.planeOp > 0.01;
      counts.forEach((lb, j) => {
        lb.material.opacity = st.countOp;
        lb.visible = st.countOp > 0.01;
        lb.position.set(D/2 + j * params.spread * st.explode, s * 1.2, -2.6);
      });
    },
  };
}

// ビルダー③: 三角すいの展開 (→正方形)

/* ===== src/units/geometry-solid/builders/cylinder.js ===== */
// ==== ビルダー: cylinder ====
function buildCylinder(scene, params) {
  const { r, h } = params;
  const C = 2 * Math.PI * r;
  makeGrid(scene, 40, 20, h / 2, C / 2);
  const NU = 72; // 円周方向

  const nVert = (NU + 1) * 2;
  const posArr = new Float32Array(nVert * 3);
  const idx = [];
  for (let iu = 0; iu < NU; iu++) {
    const a = iu * 2, b = a + 2;
    idx.push(a, b, a + 1, b, b + 1, a + 1);
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute("position", new THREE.BufferAttribute(posArr, 3));
  geo.setIndex(idx);
  scene.add(new THREE.Mesh(geo, solidMat(COL.solid)));

  // ふち(2本: x=0側 / x=h側) と 切り込み(はじまり m=0: 赤)
  const rimGeos = [0, 1].map(() => {
    const g = new THREE.BufferGeometry();
    g.setAttribute("position", new THREE.Float32BufferAttribute(new Float32Array((NU + 1) * 3), 3));
    scene.add(new THREE.Line(g, new THREE.LineBasicMaterial({ color: COL.edge })));
    return g;
  });
  const seamGeos = [0, 1].map(() => {
    const g = new THREE.BufferGeometry();
    g.setAttribute("position", new THREE.Float32BufferAttribute(new Float32Array(6), 3));
    scene.add(new THREE.Line(g, new THREE.LineBasicMaterial({ color: COL.red })));
    return g;
  });

  // 転がる円柱の両フタ(円板)
  const capDisks = [0, 1].map((i) => {
    const disk = new THREE.Mesh(
      new THREE.CircleGeometry(r, 40),
      new THREE.MeshBasicMaterial({ color: 0xdde3ea, transparent: true, opacity: 0.55, side: THREE.DoubleSide, depthWrite: false })
    );
    disk.rotation.y = Math.PI / 2;
    scene.add(disk);
    return disk;
  });

  // 展開図の円2枚 (長方形の長い辺に接する)
  const netCircles = [0, 1].map((i) => {
    const cx = i === 0 ? -r : h + r;
    const pts = [];
    for (let k = 0; k <= 60; k++) {
      const a = (k / 60) * Math.PI * 2;
      pts.push(new THREE.Vector3(cx + r * Math.cos(a), 0.03, C / 2 + r * Math.sin(a)));
    }
    const mat = new THREE.LineBasicMaterial({ color: COL.edge, transparent: true, opacity: 0 });
    scene.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts), mat));
    const disk = new THREE.Mesh(
      new THREE.CircleGeometry(r, 40),
      new THREE.MeshBasicMaterial({ color: 0xdde3ea, transparent: true, opacity: 0, side: THREE.DoubleSide, depthWrite: false })
    );
    disk.rotation.x = -Math.PI / 2;
    disk.position.set(cx, 0.012, C / 2);
    scene.add(disk);
    return { mat, disk };
  });

  return {
    update(st) {
      const theta = st.t * 2 * Math.PI;   // 転がった角度
      const zc = theta * r;               // 接地点
      for (let iu = 0; iu <= NU; iu++) {
        const m = (iu / NU) * 2 * Math.PI;
        let y, z;
        if (m <= theta) { y = 0.012; z = m * r; }
        else {
          const d = m - theta;
          z = zc + r * Math.sin(d);
          y = r * (1 - Math.cos(d)) + 0.012;
        }
        posArr[(iu*2)*3] = 0;   posArr[(iu*2)*3+1] = y; posArr[(iu*2)*3+2] = z;
        posArr[(iu*2+1)*3] = h; posArr[(iu*2+1)*3+1] = y; posArr[(iu*2+1)*3+2] = z;
      }
      geo.attributes.position.needsUpdate = true;
      geo.computeVertexNormals();
      rimGeos.forEach((g, side) => {
        const pa = g.attributes.position;
        for (let iu = 0; iu <= NU; iu++) {
          pa.setXYZ(iu, side * h, posArr[(iu*2)*3+1] + 0.012, posArr[(iu*2)*3+2]);
        }
        pa.needsUpdate = true;
      });
      // 切り込み線: m=0 と m=2π (同じ線が2本に分かれる)
      seamGeos.forEach((g, si) => {
        const iu = si === 0 ? 0 : NU;
        const pa = g.attributes.position;
        pa.setXYZ(0, 0, posArr[(iu*2)*3+1] + 0.015, posArr[(iu*2)*3+2]);
        pa.setXYZ(1, h, posArr[(iu*2)*3+1] + 0.015, posArr[(iu*2)*3+2]);
        pa.needsUpdate = true;
      });
      // フタ: 転がる円柱と一緒に移動 → 開き切ると消える
      const capOp = 0.55 * (1 - st.netOp);
      capDisks.forEach((disk, side) => {
        disk.position.set(side * h, r, zc);
        disk.material.opacity = capOp * (1 - st.t * 0.4);
        disk.visible = disk.material.opacity > 0.02;
      });
      netCircles.forEach((c) => {
        c.mat.opacity = st.netOp;
        c.disk.material.opacity = st.netOp * 0.4;
      });
    },
  };
}

/* ===== src/units/geometry-solid/builders/lathe.js ===== */
// ==== ビルダー: lathe ====
function buildLathe(scene, params) {
  makeGrid(scene, 36, 18, 0, 0);
  // 回した形 (長方形3x9 + 直角三角形 底3高さ9)
  const profPts = [[0,0,0],[3,0,0],[3,9,0],[0,18,0]];
  const profMat = new THREE.MeshBasicMaterial({ color: 0xe2574c, transparent: true, opacity: 0.5, side: THREE.DoubleSide, depthWrite: false });
  scene.add(new THREE.Mesh(polysToGeometry([profPts]), profMat));
  const profLineMat = new THREE.LineBasicMaterial({ color: COL.red });
  scene.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints([...profPts.map(V3), V3(profPts[0])]), profLineMat));
  // 回転の軸 (点線)
  const axisMat = new THREE.LineDashedMaterial({ color: 0x40506a, dashSize: 0.5, gapSize: 0.32 });
  const axisLine = new THREE.Line(
    new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0,-1.2,0), new THREE.Vector3(0,19.5,0)]),
    axisMat
  );
  axisLine.computeLineDistances();
  scene.add(axisLine);

  const lathePts = [new THREE.Vector2(0.02,0), new THREE.Vector2(3,0), new THREE.Vector2(3,9), new THREE.Vector2(0.02,18)];
  const mat = solidMat(COL.solid);
  mat.transparent = true; mat.opacity = 0.92;
  const mesh = new THREE.Mesh(new THREE.LatheGeometry(lathePts, 48, 0, 0.01), mat);
  mesh.rotation.y = Math.PI / 2; // φ=0 を +x(断面図形の位置)に合わせる
  scene.add(mesh);
  // 回転の先端(動く輪郭)
  const sweepGeo = new THREE.BufferGeometry();
  sweepGeo.setAttribute("position", new THREE.Float32BufferAttribute(new Float32Array(12), 3));
  scene.add(new THREE.Line(sweepGeo, new THREE.LineBasicMaterial({ color: COL.edge })));

  let lastPhi = -1;
  return {
    update(st) {
      const phi = Math.max(st.t * Math.PI * 2, 0.01);
      if (Math.abs(phi - lastPhi) > 0.002) {
        mesh.geometry.dispose();
        mesh.geometry = new THREE.LatheGeometry(lathePts, 48, 0, phi);
        lastPhi = phi;
        const pa = sweepGeo.attributes.position;
        profPts.forEach((p, i) => {
          pa.setXYZ(i, p[0]*Math.cos(phi)*1.002, p[1], -p[0]*Math.sin(phi)*1.002);
        });
        pa.needsUpdate = true;
      }
    },
  };
}

// ==== ビルダー: proj ====
function buildProj(scene, params) {
  makeGrid(scene, 36, 18, 3, 2);
  const edgeMat = new THREE.LineBasicMaterial({ color: 0x40506a });
  // 階段型: 下段 6x4x2 (y0..2) + 上段 6x2x2 (z0..2, y2..4)
  const boxes = [
    { g: new THREE.BoxGeometry(6, 2, 4), p: [3, 1, 2] },
    { g: new THREE.BoxGeometry(6, 2, 2), p: [3, 3, 1] },
  ];
  boxes.forEach((b) => {
    const mesh = new THREE.Mesh(b.g, solidMat(COL.solid));
    mesh.position.set(...b.p);
    scene.add(mesh);
    const e = new THREE.LineSegments(new THREE.EdgesGeometry(b.g), edgeMat);
    e.position.set(...b.p);
    scene.add(e);
  });

  function quadMesh(pts, mat) {
    const m = new THREE.Mesh(polysToGeometry([pts]), mat);
    scene.add(m);
    return m;
  }
  // 面ハイライト (方向ごと)
  const oT = redOverlayMat(), oF = redOverlayMat(), oS = redOverlayMat();
  quadMesh([[0,4.02,0],[6,4.02,0],[6,4.02,2],[0,4.02,2]], oT);
  quadMesh([[0,2.02,2],[6,2.02,2],[6,2.02,4],[0,2.02,4]], oT);
  quadMesh([[0,-0.02,0],[6,-0.02,0],[6,-0.02,4],[0,-0.02,4]], oT);
  quadMesh([[0,0,4.02],[6,0,4.02],[6,2,4.02],[0,2,4.02]], oF);
  quadMesh([[0,2,2.02],[6,2,2.02],[6,4,2.02],[0,4,2.02]], oF);
  quadMesh([[0,0,-0.02],[6,0,-0.02],[6,4,-0.02],[0,4,-0.02]], oF);
  const sPoly = (x) => [[x,0,0],[x,0,4],[x,2,4],[x,2,2],[x,4,2],[x,4,0]];
  quadMesh(sPoly(6.02), oS);
  quadMesh(sPoly(-0.02), oS);

  // シルエット板 (見た目の形)
  function silhouette(pts, mat) {
    const m = new THREE.Mesh(polysToGeometry([pts]), mat);
    const outline = new THREE.Line(
      new THREE.BufferGeometry().setFromPoints([...pts.map(V3), V3(pts[0])]),
      new THREE.LineBasicMaterial({ color: COL.red, transparent: true, opacity: 0 })
    );
    scene.add(m, outline);
    return { m, outline };
  }
  const pT = redOverlayMat(), pF = redOverlayMat(), pS = redOverlayMat();
  const silT = silhouette([[0,7.5,0],[6,7.5,0],[6,7.5,4],[0,7.5,4]], pT);
  const silF = silhouette([[0,0,7.5],[6,0,7.5],[6,4,7.5],[0,4,7.5]], pF);
  const silS = silhouette([[10,0,0],[10,0,4],[10,2,4],[10,2,2],[10,4,2],[10,4,0]], pS);

  return {
    update(st) {
      oT.opacity = st.oT * 0.55; oF.opacity = st.oF * 0.55; oS.opacity = st.oS * 0.55;
      pT.opacity = st.oT * 0.4; pF.opacity = st.oF * 0.4; pS.opacity = st.oS * 0.4;
      silT.outline.material.opacity = st.oT;
      silF.outline.material.opacity = st.oF;
      silS.outline.material.opacity = st.oS;
    },
  };
}

// ==== ビルダー: pyramidNet ====
function buildPyramidNet(scene, params) {
  const { half, hgt } = params; // 半辺3, 高さ4
  makeGrid(scene, 32, 16, 0, 0);
  const edgeMat = new THREE.LineBasicMaterial({ color: COL.edge });
  const apex = [0, hgt, 0];

  // 底面(固定)
  const basePts = [[-half,0.005,-half],[half,0.005,-half],[half,0.005,half],[-half,0.005,half]];
  scene.add(new THREE.Mesh(polysToGeometry([basePts]), solidMat(COL.solid2)));
  scene.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints([...basePts.map(V3), V3(basePts[0])]), edgeMat));

  // 4つの側面 (ヒンジ)
  const edges = [
    [[half,0,-half],[half,0,half]],
    [[half,0,half],[-half,0,half]],
    [[-half,0,half],[-half,0,-half]],
    [[-half,0,-half],[half,0,-half]],
  ];
  const movers = edges.map(([a, b]) => {
    const { axis, alpha } = hingeAlpha(a, b, apex, [0,0,0]);
    const geo = new THREE.BufferGeometry();
    geo.setAttribute("position", new THREE.Float32BufferAttribute(new Float32Array(9), 3));
    const mesh = new THREE.Mesh(geo, solidMat(COL.solid));
    const lineGeo = new THREE.BufferGeometry();
    lineGeo.setAttribute("position", new THREE.Float32BufferAttribute(new Float32Array(12), 3));
    const line = new THREE.Line(lineGeo, edgeMat);
    scene.add(mesh, line);
    return { a, b, axis, alpha, mesh, line };
  });

  // 3・4・5の直角三角形 (中心→辺の中点→頂点)
  const triPts = [[0,0.05,0],[half,0.05,0],apex,[0,0.05,0]].map(V3);
  const triMat = new THREE.LineBasicMaterial({ color: COL.red, transparent: true, opacity: 0 });
  scene.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(triPts), triMat));

  return {
    update(st) {
      for (const mv of movers) {
        const p = rotAxis(apex, mv.a, mv.axis, mv.alpha * st.t);
        const pa = mv.mesh.geometry.attributes.position;
        pa.setXYZ(0, ...mv.a); pa.setXYZ(1, ...mv.b); pa.setXYZ(2, ...p);
        pa.needsUpdate = true;
        mv.mesh.geometry.computeVertexNormals();
        const la = mv.line.geometry.attributes.position;
        la.setXYZ(0, ...mv.a); la.setXYZ(1, ...mv.b); la.setXYZ(2, ...p); la.setXYZ(3, ...mv.a);
        la.needsUpdate = true;
      }
      triMat.opacity = st.tri;
    },
  };
}

/* ===== src/units/geometry-solid/builders/pyramidVolume.js ===== */
// ==== ビルダー: pyramidVolume(すいの体積はなぜ×1/3か) ====
// 立方体を、1つの頂点を共有する3つの合同な四角すいに切り分ける。
// 3つがぴったり集まって立方体になる → すい1つ = 立方体の1/3。
//
// params: { size }  立方体の1辺
function buildPyramidVolume(scene, params) {
  const s = params.size, h = s / 2;
  makeGrid(scene, 32, 16, 0, 0);

  // 立方体の8頂点(床の上、x/z中心が原点)
  const b1 = [-h, 0, -h], b2 = [h, 0, -h], b3 = [h, 0, h], b4 = [-h, 0, h];
  const t1 = [-h, s, -h], t2 = [h, s, -h], t3 = [h, s, h], t4 = [-h, s, h];
  const apex = t1; // 3つのすいが共有する頂点

  // 3つの四角すい: 底面 = apexをふくまない3つの面
  const pyramids = [
    { base: [b1, b2, b3, b4], color: COL.solid,  dir: [0, 0, 0] },     // 底面 → 動かさない
    { base: [b4, b3, t3, t4], color: COL.solid2, dir: [0, 0, 1] },     // 前面 → +z へ
    { base: [b2, b3, t3, t2], color: COL.cap,    dir: [1, 0, 0] },     // 右面 → +x へ
  ];

  const groups = pyramids.map((p) => {
    const faces = [p.base];
    for (let i = 0; i < 4; i++) faces.push([p.base[i], p.base[(i + 1) % 4], apex]);
    const group = new THREE.Group();
    group.add(new THREE.Mesh(polysToGeometry(faces), solidMat(p.color)));
    group.add(new THREE.LineSegments(polysToEdges(faces), new THREE.LineBasicMaterial({ color: COL.edge })));
    scene.add(group);
    return { group, dir: p.dir };
  });

  return {
    update(st) {
      const d = st.sep * s * 0.9;
      for (const g of groups) {
        g.group.position.set(g.dir[0] * d, g.dir[1] * d, g.dir[2] * d);
      }
    },
  };
}


/* ===== src/units/geometry-solid/builders/sectorPrism.js ===== */
// ==== ビルダー: sectorPrism ====
function buildSectorPrism(scene, params) {
  const { r, h } = params;
  const Q = Math.PI / 2;
  const L = r * Q;              // 弧の長さ 9.42
  const NC = 40;
  makeGrid(scene, 44, 22, 3, 0);
  const edgeMat = new THREE.LineBasicMaterial({ color: COL.edge });

  // ---- 立体パーツ (組み立て時) ----
  // 底面(下・固定)
  const botPts = sectorPoly(r, 0, Q, NC, 0.005);
  scene.add(new THREE.Mesh(polysToGeometry([botPts]), solidMat(COL.solid2)));
  scene.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints([...botPts.map(V3), V3(botPts[0])]), edgeMat));

  // 上のフタ(扇形・動く)→ 展開図では長方形の下に置く
  const topGroup = new THREE.Group();
  const topPts = sectorPoly(r, 0, Q, NC, 0);
  topGroup.add(new THREE.Mesh(polysToGeometry([topPts]), solidMat(COL.solid2)));
  topGroup.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints([...topPts.map(V3), V3(topPts[0])]), edgeMat));
  scene.add(topGroup);

  // 展開図の帯(側面3枚まとめて1つの長方形)。横位置 x0..x0+(6+L+6), 高さ0..h
  // 立体では: [0..6=直辺A(x軸)] → [弧9.42] → [6..12=直辺B(z軸)]
  // 帯メッシュ: パラメータ p を 0..(6+L+6) で動かし、立体位置↔展開位置を補間
  const straight = r; // 6
  const total = straight + L + straight;
  const NP = 96;
  const nVert = (NP + 1) * 2;
  const pos = new Float32Array(nVert * 3);
  const idx = [];
  for (let i = 0; i < NP; i++) { const a = i*2, b = a+2; idx.push(a,b,a+1, b,b+1,a+1); }
  const bandGeo = new THREE.BufferGeometry();
  bandGeo.setAttribute("position", new THREE.BufferAttribute(pos, 3));
  bandGeo.setIndex(idx);
  scene.add(new THREE.Mesh(bandGeo, solidMat(COL.solid)));
  const bandLines = [0,1].map(() => {
    const g = new THREE.BufferGeometry();
    g.setAttribute("position", new THREE.Float32BufferAttribute(new Float32Array((NP+1)*3), 3));
    scene.add(new THREE.Line(g, edgeMat));
    return g;
  });
  // 折り目(直辺と弧の境目)を示す赤い縦線2本
  const foldLines = [straight, straight + L].map(() => {
    const g = new THREE.BufferGeometry();
    g.setAttribute("position", new THREE.Float32BufferAttribute(new Float32Array(6), 3));
    const line = new THREE.Line(g, new THREE.LineBasicMaterial({ color: COL.red, transparent: true, opacity: 0 }));
    scene.add(line);
    return line;
  });

  // 立体上の底辺の座標(p→3D)
  function solidPoint(p) {
    if (p <= straight) {
      // 直辺A: 原点→(r,0,0) に沿う。ただし展開の見栄えで弧が中央に来るよう、
      // A は原点から +x、境界で弧の始点(r,0,0)へ
      return [p, 0, 0];
    } else if (p <= straight + L) {
      const a = (p - straight) / r; // 0..Q
      return [r * Math.cos(a), 0, r * Math.sin(a)];
    } else {
      const q = p - straight - L;    // 0..r 直辺B: (0,0,r)→原点方向? 実際は弧終点(0,0,r)から原点へ
      return [0, 0, r - q];
    }
  }
  // 展開図上の底辺の座標(p→2D 平面 x-z, 帯は -z 側に倒す)
  const bandX0 = -total / 2 + 3;
  function flatPoint(p) {
    return [bandX0 + p, 0, -r - 1.5]; // 帯全体を手前(-z)に一直線
  }

  return {
    update(st) {
      const tt = st.topT;      // フタを上へ持ち上げ→展開位置
      const bt = st.bandT;     // 側面帯を立体→展開へ
      // フタ: 持ち上げてから展開図の帯の下(z=-r-1.5-r-...)へ
      const lift = Math.sin(Math.min(tt,0.6)/0.6 * Math.PI/2) * (h + 2);
      const netTop = [bandX0 + straight + L/2 - r*0.7, 0, -r - 1.5 - r - 2.6];
      topGroup.position.set(netTop[0]*tt, h*(1-tt)+lift*(1-tt)+ (h+2)*0 +0.02 + lift*0, netTop[2]*tt);
      // ↑ 単純化: 高さは (1-tt)*h から 0 へ、途中 lift 分持ち上げ
      topGroup.position.y = h*(1-tt) + lift + 0.02;
      topGroup.position.x = netTop[0]*tt;
      topGroup.position.z = netTop[2]*tt;

      // 側面帯: 各pで 立体底辺→展開底辺、上辺は+h を維持したまま倒れる
      for (let i = 0; i <= NP; i++) {
        const p = (i/NP)*total;
        const sp = solidPoint(p);
        const fp = flatPoint(p);
        const bx = sp[0] + (fp[0]-sp[0])*bt;
        const bz = sp[2] + (fp[2]-sp[2])*bt;
        // 上辺: 立体では真上(+h)、展開では帯に沿って平ら(z がさらに -h ぶん外へ)
        const topSolid = [sp[0], h, sp[2]];
        const topFlat  = [fp[0], 0.01, fp[2] - h];
        const tx = topSolid[0] + (topFlat[0]-topSolid[0])*bt;
        const ty = topSolid[1] + (topFlat[1]-topSolid[1])*bt;
        const tz = topSolid[2] + (topFlat[2]-topSolid[2])*bt;
        pos[(i*2)*3]=bx; pos[(i*2)*3+1]=0.012; pos[(i*2)*3+2]=bz;
        pos[(i*2+1)*3]=tx; pos[(i*2+1)*3+1]=ty+0.012; pos[(i*2+1)*3+2]=tz;
      }
      bandGeo.attributes.position.needsUpdate = true;
      bandGeo.computeVertexNormals();
      bandLines.forEach((g,row)=>{
        const pa=g.attributes.position;
        for(let i=0;i<=NP;i++){ pa.setXYZ(i, pos[(i*2+row)*3], pos[(i*2+row)*3+1]+0.01, pos[(i*2+row)*3+2]); }
        pa.needsUpdate=true;
      });
      [straight, straight+L].forEach((p,fi)=>{
        const i = Math.round(p/total*NP);
        const g=foldLines[fi].geometry.attributes.position;
        g.setXYZ(0, pos[(i*2)*3], pos[(i*2)*3+1]+0.02, pos[(i*2)*3+2]);
        g.setXYZ(1, pos[(i*2+1)*3], pos[(i*2+1)*3+1]+0.02, pos[(i*2+1)*3+2]);
        g.needsUpdate=true;
        foldLines[fi].material.opacity = st.foldOp ?? 1;
      });
    },
  };
}

/* ===== src/units/geometry-solid/builders/string.js ===== */
// ==== ビルダー: string ====
function buildString(scene, params) {
  makeGrid(scene, 36, 18, 5, 0);
  const NU = 64, NV = 8, NS = 60;

  function makeConeSys(r, l, angText) {
    const group = new THREE.Group();
    scene.add(group);
    const Theta = 2 * Math.PI * r / l;
    // 側面メッシュ
    const nVert = (NU + 1) * (NV + 1);
    const posArr = new Float32Array(nVert * 3);
    const idx = [];
    for (let iu = 0; iu < NU; iu++) for (let iv = 0; iv < NV; iv++) {
      const a = iu * (NV + 1) + iv, b = a + (NV + 1);
      idx.push(a, b, a + 1, b, b + 1, a + 1);
    }
    const geo = new THREE.BufferGeometry();
    geo.setAttribute("position", new THREE.BufferAttribute(posArr, 3));
    geo.setIndex(idx);
    group.add(new THREE.Mesh(geo, solidMat(COL.solid)));
    // 母線(切り込み)2本
    const seamGeos = [0, NU].map(() => {
      const g = new THREE.BufferGeometry();
      g.setAttribute("position", new THREE.Float32BufferAttribute(new Float32Array((NV + 1) * 3), 3));
      group.add(new THREE.Line(g, new THREE.LineBasicMaterial({ color: COL.edge })));
      return g;
    });
    // ひも(展開図の弦を折り目パラメータで巻き付ける)
    const chordX = l * Math.cos(Theta / 2);
    const chordZ = l * Math.sin(Theta / 2);
    const flat = [];
    for (let i = 0; i <= NS; i++) {
      const z = -chordZ + (i / NS) * 2 * chordZ;
      const rho = Math.hypot(chordX, z);
      const phi = Math.atan2(z, chordX);
      flat.push({ rho, u: (phi + Theta / 2) / Theta });
    }
    const strGeo = new THREE.BufferGeometry();
    strGeo.setAttribute("position", new THREE.Float32BufferAttribute(new Float32Array((NS + 1) * 3), 3));
    group.add(new THREE.Line(strGeo, new THREE.LineBasicMaterial({ color: COL.red })));
    // Aラベル×2
    const labs = [0, 1].map(() => {
      const lb = makeLabel("A", { color: "#b03a30", world: 1.05 });
      group.add(lb);
      return lb;
    });
    // 中心角ラベル
    const angLb = makeLabel(angText, { color: "#b03a30", world: 1.4 });
    angLb.position.set(1.4, 0.4, 0);
    group.add(angLb);
    // 底面の輪郭
    const circ = [];
    for (let i = 0; i <= 60; i++) {
      const a = (i / 60) * Math.PI * 2;
      circ.push(new THREE.Vector3(r * Math.cos(a), 0.03, r * Math.sin(a)));
    }
    const baseLine = new THREE.Line(new THREE.BufferGeometry().setFromPoints(circ), new THREE.LineBasicMaterial({ color: COL.edge }));
    group.add(baseLine);

    const mats = collectMats(group);
    return {
      group,
      update(t, op, angOp) {
        const R = r + (l - r) * t;
        const psi = 2 * Math.PI * r / R;
        const h = Math.sqrt(Math.max(l * l - R * R, 0));
        for (let iu = 0; iu <= NU; iu++) {
          const ang = -psi / 2 + (iu / NU) * psi;
          const cx = Math.cos(ang), sz = Math.sin(ang);
          for (let iv = 0; iv <= NV; iv++) {
            const f = iv / NV;
            const n = iu * (NV + 1) + iv;
            posArr[n*3] = R * cx * f;
            posArr[n*3+1] = h * (1 - f);
            posArr[n*3+2] = R * sz * f;
          }
        }
        geo.attributes.position.needsUpdate = true;
        geo.computeVertexNormals();
        [0, NU].forEach((iu, si) => {
          const pa = seamGeos[si].attributes.position;
          for (let iv = 0; iv <= NV; iv++) {
            const n = iu * (NV + 1) + iv;
            pa.setXYZ(iv, posArr[n*3], posArr[n*3+1] + 0.015, posArr[n*3+2]);
          }
          pa.needsUpdate = true;
        });
        const sa = strGeo.attributes.position;
        for (let i = 0; i <= NS; i++) {
          const { rho, u } = flat[i];
          const ang = -psi / 2 + u * psi;
          const f = rho / l;
          sa.setXYZ(i, R * Math.cos(ang) * f * 1.004, h * (1 - f) + 0.04, R * Math.sin(ang) * f * 1.004);
        }
        sa.needsUpdate = true;
        [0, NS].forEach((i, li) => {
          labs[li].position.set(sa.getX(i), sa.getY(i) + 0.55, sa.getZ(i));
        });
        mats.forEach((m) => (m.opacity = op));
        baseLine.material.opacity = op * (1 - 0.85 * t);
        angLb.material.opacity = op * angOp;
        group.visible = op > 0.02;
      },
    };
  }

  const c1 = makeConeSys(params.r1, params.l1, params.ang1);
  const c2 = makeConeSys(params.r2, params.l2, params.ang2);

  return {
    update(st) {
      c1.update(st.t1, st.op1, st.a1);
      c2.update(st.t2, st.op2, st.a2);
    },
  };
}

// ==== ビルダー: unfold ====
function buildUnfold(scene, params) {
  const UF = params.uf;
  const T = UF.T;

  makeGrid(scene, 26, 13, UF.center[0], UF.center[2]);
  const edgeMat = new THREE.LineBasicMaterial({ color: COL.edge });

  const fixedTri = [T[params.fixed[0]], T[params.fixed[1]], T[params.fixed[2]]];
  scene.add(new THREE.Mesh(polysToGeometry([fixedTri]), solidMat(COL.solid2)));
  scene.add(new THREE.LineSegments(polysToEdges([fixedTri]), edgeMat));

  const movers = UF.moving.map((m) => {
    const geo = new THREE.BufferGeometry();
    geo.setAttribute("position", new THREE.Float32BufferAttribute(new Float32Array(9), 3));
    const mesh = new THREE.Mesh(geo, solidMat(COL.solid));
    const lineGeo = new THREE.BufferGeometry();
    lineGeo.setAttribute("position", new THREE.Float32BufferAttribute(new Float32Array(12), 3));
    const line = new THREE.Line(lineGeo, edgeMat);
    scene.add(mesh, line);
    const label = makeLabel(params.apexName, { color: "#b03a30", world: 1.15 });
    scene.add(label);
    return { m, mesh, line, label };
  });

  params.fixed.forEach((name) => {
    const lb = makeLabel(name, { color: "#24354d", world: 1.15 });
    const p = T[name];
    lb.position.set(p[0], p[1] + 0.55, p[2]);
    scene.add(lb);
  });

  const sc = UF.squareCorners;
  const ghostPts = [...sc, sc[0]].map((p) => new THREE.Vector3(p[0], 0.03, p[2]));
  const ghostMat = new THREE.LineDashedMaterial({ color: COL.red, dashSize: 0.42, gapSize: 0.26, transparent: true, opacity: 0 });
  const ghost = new THREE.Line(new THREE.BufferGeometry().setFromPoints(ghostPts), ghostMat);
  ghost.computeLineDistances();
  scene.add(ghost);

  const scratch = new THREE.Vector3();

  return {
    update(st) {
      for (const mv of movers) {
        const { a, b, p0, axis, alpha } = mv.m;
        const p = rotAxis(p0, a, axis, alpha * st.t);
        const pa = mv.mesh.geometry.attributes.position;
        pa.setXYZ(0, ...a); pa.setXYZ(1, ...b); pa.setXYZ(2, ...p);
        pa.needsUpdate = true;
        mv.mesh.geometry.computeVertexNormals();
        const la = mv.line.geometry.attributes.position;
        la.setXYZ(0, ...a); la.setXYZ(1, ...b); la.setXYZ(2, ...p); la.setXYZ(3, ...a);
        la.needsUpdate = true;
        scratch.set(p[0], p[1] + 0.55, p[2]);
        mv.label.position.copy(scratch);
        mv.label.material.opacity = st.pLabels;
      }
      ghostMat.opacity = st.ghost;
    },
  };
}

// ==== ビルダー: water ====
function buildWater(scene, params) {
  const { W, D, H, waterVol, baseArea, wSide, wCount, wAreaSum } = params;

  makeGrid(scene, 46, 14, 0, 0);

  const boxGeo = new THREE.BoxGeometry(W, H, D);
  const glass = new THREE.Mesh(
    boxGeo,
    new THREE.MeshLambertMaterial({ color: COL.glass, transparent: true, opacity: 0.14, side: THREE.BackSide, depthWrite: false })
  );
  glass.position.y = H / 2;
  scene.add(glass);
  const boxEdges = new THREE.LineSegments(new THREE.EdgesGeometry(boxGeo), new THREE.LineBasicMaterial({ color: 0x40506a }));
  boxEdges.position.y = H / 2;
  scene.add(boxEdges);

  const water = new THREE.Mesh(
    new THREE.BoxGeometry(W - 0.3, 1, D - 0.3),
    new THREE.MeshLambertMaterial({ color: COL.water, transparent: true, opacity: 0.5, depthWrite: false })
  );
  scene.add(water);

  const weights = [];
  for (let i = 0; i < wCount; i++) {
    const g = new THREE.Group();
    const body = new THREE.Mesh(
      new THREE.BoxGeometry(wSide - 0.4, wSide, wSide - 0.4),
      new THREE.MeshStandardMaterial({ color: 0x8a93a6, roughness: 0.6, metalness: 0.15, transparent: true, opacity: 0 })
    );
    const edge = new THREE.LineSegments(
      new THREE.EdgesGeometry(body.geometry),
      new THREE.LineBasicMaterial({ color: 0x3a4356, transparent: true, opacity: 0 })
    );
    g.add(body, edge);
    g.position.x = (i - (wCount - 1) / 2) * wSide;
    scene.add(g);
    weights.push({ g, body, edge });
  }

  const tl = wSide;
  const ringPts = [
    new THREE.Vector3(-W/2-0.3, tl, -D/2-0.3), new THREE.Vector3(W/2+0.3, tl, -D/2-0.3),
    new THREE.Vector3(W/2+0.3, tl, D/2+0.3), new THREE.Vector3(-W/2-0.3, tl, D/2+0.3),
    new THREE.Vector3(-W/2-0.3, tl, -D/2-0.3),
  ];
  const tenMat = new THREE.LineDashedMaterial({ color: COL.red, dashSize: 0.55, gapSize: 0.35, transparent: true, opacity: 0 });
  const tenLine = new THREE.Line(new THREE.BufferGeometry().setFromPoints(ringPts), tenMat);
  tenLine.computeLineDistances();
  scene.add(tenLine);
  const tenLabel = makeLabel("おもりの高さ 10cm", { color: "#b03a30", world: 1.15 });
  tenLabel.position.set(W/2 + 4.6, tl, D/2);
  tenLabel.material.opacity = 0;
  scene.add(tenLabel);

  const wl = makeLabel("水面 0.0cm", { color: "#1d5c94", world: 1.25 });
  wl.position.set(W/2 + 3.6, 1, D/2 + 0.5);
  scene.add(wl);

  return {
    update(st) {
      const L = solveWaterLevel(baseArea, waterVol, st.weightY, wAreaSum * st.wVis, wSide);
      water.scale.y = Math.max(L, 0.02);
      water.position.y = L / 2;
      for (const w of weights) {
        w.g.position.y = st.weightY + wSide / 2;
        w.body.material.opacity = st.wVis;
        w.edge.material.opacity = st.wVis;
        w.g.visible = st.wVis > 0.02;
      }
      setLabelText(wl, `水面 ${L.toFixed(1)}cm`);
      wl.position.y = L + 0.55;
      tenMat.opacity = st.tenLine;
      tenLabel.material.opacity = st.tenLine;
    },
  };
}
