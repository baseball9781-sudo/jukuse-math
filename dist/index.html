// ==== ビルダー: water2 ====
function buildWater2(scene, params) {
  const { wA, wB, D, H } = params; // 幅6+9, 奥行10, 高さ15
  const Wt = wA + wB;
  const x0 = -Wt / 2;              // 左端
  const xd = x0 + wA;              // 仕切り位置

  makeGrid(scene, 46, 14, 0, 0);

  const boxGeo = new THREE.BoxGeometry(Wt, H, D);
  const glass = new THREE.Mesh(
    boxGeo,
    new THREE.MeshLambertMaterial({ color: COL.glass, transparent: true, opacity: 0.14, side: THREE.BackSide, depthWrite: false })
  );
  glass.position.y = H / 2;
  scene.add(glass);
  const boxEdges = new THREE.LineSegments(new THREE.EdgesGeometry(boxGeo), new THREE.LineBasicMaterial({ color: 0x40506a }));
  boxEdges.position.y = H / 2;
  scene.add(boxEdges);

  // 仕切り板
  const divider = new THREE.Group();
  const divBody = new THREE.Mesh(
    new THREE.BoxGeometry(0.24, H, D - 0.2),
    new THREE.MeshStandardMaterial({ color: 0x9aa5b5, roughness: 0.7, transparent: true, opacity: 0.9 })
  );
  divider.add(divBody);
  divider.add(new THREE.LineSegments(new THREE.EdgesGeometry(divBody.geometry), new THREE.LineBasicMaterial({ color: 0x3a4356 })));
  divider.position.set(xd, H / 2, 0);
  scene.add(divider);

  // 水 (左右)
  const waterMatL = new THREE.MeshLambertMaterial({ color: COL.water, transparent: true, opacity: 0.5, depthWrite: false });
  const waterL = new THREE.Mesh(new THREE.BoxGeometry(wA - 0.35, 1, D - 0.3), waterMatL);
  const waterR = new THREE.Mesh(new THREE.BoxGeometry(wB - 0.35, 1, D - 0.3), waterMatL.clone());
  scene.add(waterL, waterR);

  const wlab = makeLabel("水面 0.0cm", { color: "#1d5c94", world: 1.25 });
  wlab.position.set(Wt/2 + 3.4, 1, D/2 + 0.5);
  scene.add(wlab);

  return {
    update(st) {
      waterL.scale.y = Math.max(st.levelA, 0.02);
      waterL.position.set(x0 + wA / 2 - 0.06, st.levelA / 2, 0);
      waterR.scale.y = Math.max(st.levelB, 0.02);
      waterR.position.set(xd + wB / 2 + 0.06, st.levelB / 2, 0);
      divider.position.y = H / 2 + st.dividerY;
      setLabelText(wlab, `水面 ${st.levelB.toFixed(1)}cm`);
      wlab.position.y = st.levelB + 0.55;
    },
  };
}

/* ===== src/units/ratio/builders/saltBalance.js ===== */
// ==== ビルダー(2D): 食塩水のてんびん図 ====
// 濃さの数直線に、食塩水を「重さのおもり」としてぶら下げ、
// つり合う支点の位置 = 混ぜてできる濃さ、を見せる。
//
// params:
//   a: { c, w }  食塩水A(濃さ%, 重さg)
//   b: { c, w }  食塩水B
//   mix        : 混ぜた濃さ(事前計算して渡す)
function buildSaltBalance(params) {
  const A = params.a, B = params.b, mix = params.mix;
  const cMin = Math.floor(Math.min(A.c, B.c)) - 2;
  const cMax = Math.ceil(Math.max(A.c, B.c)) + 2;

  return {
    draw(g, st, screen) {
      const beamY = st.beamY;
      const fx = st.fx;
      const tilt = (st.tilt || 0) * Math.PI / 180;

      // --- 濃さの数直線 ---
      g.arrow(cMin, 0, cMax + 0.6, 0, { color: C2D.axis, w: 1.5, head: 9 });
      g.text(cMax + 0.6, 0, "濃さ(%)", { dx: 8, dy: 14, align: "left", size: 11, color: C2D.axis });
      for (let c = cMin; c <= cMax; c++) {
        g.line(c, 0, c, 0.12, { color: C2D.axis, w: 1 });
        g.text(c, -0.38, `${c}`, { size: 11, weight: "normal", color: C2D.axis });
      }
      // A,Bの濃さの位置
      [A, B].forEach((s) => {
        g.dot(s.c, 0, { color: C2D.ink, rp: 4 });
        g.text(s.c, -0.95, `${s.c}%`, { size: 13, color: C2D.ink });
      });

      // --- てんびん(支点を中心に tilt 回転) ---
      if (st.showBeam > 0.01) {
        const al = st.showBeam;
        // 支点(三角形)と、支点位置を数直線へ落とす点線
        g.poly([[fx, beamY], [fx - 0.28, beamY - 0.55], [fx + 0.28, beamY - 0.55]],
          { color: C2D.edge, w: 2, fill: C2D.solid2, fillAlpha: al, alpha: al });
        g.line(fx, beamY - 0.55, fx, 0, { color: C2D.ghost, dash: [4, 4], w: 1, alpha: al });

        // 棒
        const end = (c) => {
          const dx = c - fx;
          return [fx + dx * Math.cos(tilt), beamY + dx * Math.sin(tilt)];
        };
        const eA = end(A.c), eB = end(B.c);
        g.line(eA[0], eA[1], eB[0], eB[1], { color: C2D.edge, w: 4, alpha: al });

        // おもり(重さに比例した水色の箱)をぶら下げる
        const box = (e, wgt) => {
          const bw = 0.55 + wgt / 400;
          const bh = 0.45 + wgt / 700;
          const topY = e[1] - 0.18;
          g.line(e[0], e[1], e[0], topY, { color: C2D.edge, w: 1.5, alpha: al });
          g.poly([[e[0] - bw / 2, topY], [e[0] + bw / 2, topY],
                  [e[0] + bw / 2, topY - bh], [e[0] - bw / 2, topY - bh]],
            { color: C2D.edge, w: 2, fill: C2D.waterFill, fillAlpha: al, alpha: al });
          g.text(e[0], topY - bh / 2, `${wgt}g`, { size: 12, color: C2D.ink, alpha: al });
        };
        box(eA, A.w);
        box(eB, B.w);
      }

      // 支点の位置 = 答えの濃さ
      if (st.showFx > 0.01) {
        g.dot(fx, 0, { color: C2D.red, rp: 5, alpha: st.showFx });
        g.text(fx, -0.95, st.showAns > 0.5 ? `${mix}%` : "?", { size: 15, color: C2D.red, alpha: st.showFx });
      }

      // 距離の比(重さの逆比)
      if (st.showRatio > 0.01) {
        const ry = beamY + 0.55;
        const seg = (x0, x1, label) => {
          g.arrow(x0, ry, x1, ry, { color: C2D.red, w: 2, head: 8, alpha: st.showRatio });
          g.arrow(x1, ry, x0, ry, { color: C2D.red, w: 2, head: 8, alpha: st.showRatio });
          g.text((x0 + x1) / 2, ry + 0.42, label, { size: 14, color: C2D.red, alpha: st.showRatio });
        };
        seg(A.c, mix, `${mix - A.c}`);
        seg(mix, B.c, `${B.c - mix}`);
      }
    },
  };
}

// ==== ビルダー(2D): 通過算(列車が橋をわたる) ====
// 「わたり始め=先頭が橋に入る」「わたり終わり=最後尾が橋を出る」の間に、
// 列車(の先頭)は 橋の長さ+列車の長さ だけ進むことを見せる。
//
// params:
//   trainLen  : 列車の長さ(m)
//   bridgeLen : 橋の長さ(m)
//   v         : 秒速(m)
//   ans       : 通過にかかる時間(秒) (事前計算)
function buildPassTrain(params) {
  const { trainLen, bridgeLen, v, ans } = params;

  return {
    draw(g, st, screen) {
      const front = st.front;         // 先頭の位置(m)。橋の入り口=0
      const sc = st.ms;               // 1m = ワールド何単位
      const y = 0;                    // 線路の高さ
      const trainH = 1.35;            // 列車の見た目の高さ(ワールド)

      // --- 線路と橋 ---
      g.line(-320 * sc, y, (bridgeLen + 420) * sc, y, { color: C2D.ghost, w: 2 });
      g.line(0, y, bridgeLen * sc, y, { color: C2D.edge, w: 5 });
      // 橋脚
      for (let i = 0; i <= 4; i++) {
        const px = (bridgeLen * i / 4) * sc;
        g.line(px, y, px, y - 0.55, { color: C2D.edge, w: 2 });
      }
      g.text(bridgeLen * sc / 2, y - 1.05, `橋 ${bridgeLen}m`, { size: 13, color: C2D.ink });
      g.line(0, y - 0.7, 0, y + trainH + 0.9, { color: C2D.ghost, w: 1, dash: [4, 4] });
      g.line(bridgeLen * sc, y - 0.7, bridgeLen * sc, y + trainH + 0.9, { color: C2D.ghost, w: 1, dash: [4, 4] });

      // --- 列車(先頭front、後方にtrainLen) ---
      const x1 = front * sc, x0 = (front - trainLen) * sc;
      g.poly([[x0, y + 0.12], [x1, y + 0.12], [x1, y + 0.12 + trainH], [x0, y + 0.12 + trainH]],
        { color: C2D.edge, w: 2, fill: C2D.solid2, fillAlpha: 1 });
      // 先頭・最後尾のマーク
      g.dot(x1, y + 0.12 + trainH / 2, { color: C2D.red, rp: 5 });
      g.text((x0 + x1) / 2, y + 0.12 + trainH / 2, `列車 ${trainLen}m`, { size: 12, color: C2D.ink });

      // わたり始めの列車の残像
      if (st.showGhost > 0.01) {
        const al = st.showGhost * 0.45;
        g.poly([[-trainLen * sc, y + 0.12], [0, y + 0.12], [0, y + 0.12 + trainH], [-trainLen * sc, y + 0.12 + trainH]],
          { color: C2D.ghost, w: 1.5, dash: [5, 4], alpha: al, fill: null });
      }

      // --- 先頭が進んだ道のり(赤い矢印) ---
      if (st.showDist > 0.01 && front > 1) {
        const al = st.showDist, ay = y + trainH + 1.6;
        g.arrow(0, ay, front * sc, ay, { color: C2D.red, w: 2.5, head: 10, alpha: al });
        g.line(0, ay - 0.25, 0, ay + 0.25, { color: C2D.red, w: 2, alpha: al });
        g.text(front * sc / 2, ay + 0.55, st.showAns > 0.5 ? `${bridgeLen}m + ${trainLen}m = ${bridgeLen + trainLen}m` : "先頭が進んだ道のり", { size: 13, color: C2D.red, alpha: al });
      }
    },
  };
}


/* ===== src/units/speed/builders/stream.js ===== */
// ==== ビルダー(2D): 流水算(川の上り下り) ====
// 上に川と船、下にダイヤグラム。下りは「静水速+流速」、上りは「静水速−流速」で
// グラフの傾きが変わることを見せる。
//
// params:
//   dist  : 川の区間の長さ(km)
//   still : 静水での速さ(km/h)
//   cur   : 流れの速さ(km/h)
//   tDown : 下りにかかる時間(h)   tUp: 上りにかかる時間(h) (事前計算)
function buildStream(params) {
  const { dist, still, cur, tDown, tUp } = params;
  const vDown = still + cur, vUp = still - cur;
  const tAll = tDown + tUp;
  // 船の位置(0..dist)。t: 0..tAll。下り→上り。
  const pos = (t) => (t <= tDown ? vDown * t : Math.max(0, dist - vUp * (t - tDown)));

  return {
    draw(g, st, screen) {
      const t = st.t * tAll;
      const riverY = st.riverY;           // 川の帯の下端
      const xs = st.xScale;               // グラフ: 1h = ワールド何単位
      const ds = st.dScale;               // グラフ: 1km = ワールド何単位

      // --- 川(上・横帯)。A(上流,左)→B(下流,右) ---
      g.poly([[0, riverY], [dist * st.rs, riverY], [dist * st.rs, riverY + 1.2], [0, riverY + 1.2]],
        { color: null, fill: C2D.waterFill, fillAlpha: 0.55 });
      g.text(0, riverY + 1.8, "A(上流)", { align: "left", dx: -10, size: 12, color: C2D.ink });
      g.text(dist * st.rs, riverY + 1.8, "B(下流)", { align: "right", dx: 10, size: 12, color: C2D.ink });
      // 流れの矢印(左→右)
      for (let i = 0; i < 3; i++) {
        const ax = dist * st.rs * (0.18 + 0.3 * i);
        g.arrow(ax, riverY + 0.6, ax + 1.2, riverY + 0.6, { color: C2D.water, w: 2, head: 7 });
      }
      g.text(dist * st.rs * 0.5, riverY - 0.45, `流れ 時速${cur}km`, { size: 11, color: C2D.water });

      // 船(丸)と向き
      const bx = pos(t) * st.rs;
      const goingDown = t <= tDown;
      g.dot(bx, riverY + 0.6, { color: C2D.red, rp: 8, ring: true });
      g.badge(bx, riverY + 0.6, "船", { dy: -24, bg: C2D.red });

      // 速さの合成(矢印の足し算/引き算)
      if (st.showArrows > 0.01) {
        const al = st.showArrows, ay = riverY + 2.4;
        const u = 0.28; // 1km/h = 0.28ワールド
        g.text(0, ay + 0.85, goingDown ? "下り = 静水の速さ + 流れ" : "上り = 静水の速さ − 流れ", { align: "left", dx: -10, size: 13, color: C2D.ink, alpha: al });
        // 静水の速さ(黒)
        g.arrow(0, ay, still * u * (goingDown ? 1 : -1) + 0, ay, { color: C2D.ink, w: 3, head: 9, alpha: al });
        // 流れ(青): 下りは同じ向き、上りは逆向き
        const fx0 = still * u * (goingDown ? 1 : -1);
        g.arrow(fx0, ay, fx0 + cur * u, ay, { color: C2D.water, w: 3, head: 9, alpha: al });
        g.text((goingDown ? (still + cur) : -(still - cur)) * u / 2, ay - 0.55,
          goingDown ? `${still}+${cur}=${vDown}km/h` : `${still}−${cur}=${vUp}km/h`,
          { size: 12, color: C2D.red, alpha: al });
      }

      // --- ダイヤグラム(下): 横=時間 / 縦=距離(Aから) ---
      if (st.showGraph > 0.01) {
        const al = st.showGraph, gy = st.graphY;
        g.arrow(0, gy, tAll * xs + 0.7, gy, { color: C2D.axis, w: 1.5, head: 9, alpha: al });
        g.arrow(0, gy, 0, gy + dist * ds + 0.8, { color: C2D.axis, w: 1.5, head: 9, alpha: al });
        g.text(tAll * xs + 0.7, gy, "時間", { dx: 6, dy: 12, align: "left", size: 11, color: C2D.axis, alpha: al });
        g.text(0, gy + dist * ds + 0.8, "距離", { dy: -10, size: 11, color: C2D.axis, alpha: al });
        for (let hh = 1; hh <= tAll + 1e-9; hh++) {
          g.line(hh * xs, gy, hh * xs, gy + 0.12, { color: C2D.axis, w: 1, alpha: al });
          g.text(hh * xs, gy - 0.5, `${hh}`, { size: 10, weight: "normal", color: C2D.axis, alpha: al });
        }
        g.line(0, gy + dist * ds, tAll * xs, gy + dist * ds, { color: C2D.grid, w: 1, dash: [4, 4], alpha: al });
        g.text(-0.25, gy + dist * ds, "B", { align: "right", size: 11, weight: "normal", color: C2D.axis, alpha: al });
        // 折れ線(0..t)
        const NS = 80, pts = [];
        for (let i = 0; i <= NS; i++) {
          const tt = (i / NS) * t;
          pts.push([tt * xs, gy + pos(tt) * ds]);
        }
        g.path(pts, { color: C2D.red, w: 2.5, alpha: al });
        g.dot(t * xs, gy + pos(t) * ds, { color: C2D.red, rp: 5, alpha: al });
      }
    },
  };
}


/* ===== src/units/speed/builders/travel.js ===== */
// ==== ビルダー(2D): 旅人算のダイヤグラム ====
// 上に「道(横一直線)」を置いて2人を動かし、下に距離-時間グラフを同時に描く。
// 状態 st.t(0→1)を「時刻の進み」に対応させ、出会い/追いつきの瞬間を可視化する。
//
// params:
//   dist    : 2地点間の距離(km)
//   tMax    : グラフに描く最大時間(時間)
//   a: { name, x0, v }  A(位置x0から速さv)   v>0 で右へ
//   b: { name, x0, v }  B
//   meetT   : 出会い/追いつきの時刻(事前計算して渡す。null可)
function buildTravel(params) {
  const { dist, tMax } = params;
  const A = params.a, B = params.b;
  const posA = (t) => A.x0 + A.v * t;
  const posB = (t) => B.x0 + B.v * t;

  // レイアウト(ワールド座標): 道は y=roadY の横線、グラフは左下原点
  // ワールドx = 距離(km), ワールドy: 道の表示帯は上、グラフは時間軸(縦)…
  // 2Dは1つのビューに収めるため、道とグラフを別々のワールド領域に配置する。
  // 道:   x∈[0,dist], y = roadY(固定)
  // グラフ:原点(gx0,gy0)、横=距離(x, 0..dist)、縦=時間(t, 0..tMax) を上向きに
  return {
    draw(g, st, screen) {
      const t = st.t * tMax;                 // 現在時刻
      const roadY = st.roadY;
      const gx0 = 0, gy0 = st.graphBase;     // グラフ原点(距離0・時刻0)
      const tScale = st.tScale;              // 時間1 = 距離いくつ分の高さ

      // --- 道(上) ---
      g.line(0, roadY, dist, roadY, { color: C2D.edge, w: 3 });
      g.text(0, roadY, "P", { dy: -18, color: C2D.ink });
      g.text(dist, roadY, "Q", { dy: -18, color: C2D.ink });
      for (let k = 0; k <= dist; k += st.tick || dist) {
        g.line(k, roadY, k, roadY, {});
      }

      // 動く2人(道の上)
      const ax = Math.max(0, Math.min(dist, posA(t)));
      const bx = Math.max(0, Math.min(dist, posB(t)));
      g.dot(ax, roadY, { color: C2D.red, rp: 7, ring: true });
      g.badge(ax, roadY, A.name, { dy: 22, bg: C2D.red });
      g.dot(bx, roadY, { color: C2D.blue, rp: 7, ring: true });
      g.badge(bx, roadY, B.name, { dy: -26, bg: C2D.blue });

      // --- グラフ(下): 横軸=距離 / 縦軸=時間 ---
      const gyTop = gy0 + tMax * tScale;
      // 軸
      g.arrow(gx0, gy0, dist + 0.6, gy0, { color: C2D.axis, w: 1.5, head: 9 });      // 距離軸(右)
      g.arrow(gx0, gy0, gx0, gyTop + 0.6, { color: C2D.axis, w: 1.5, head: 9 });     // 時間軸(上)…yUp=falseなので下で加算=画面下方向。座標系はyUp想定でtScale負で調整
      g.text(dist + 0.6, gy0, "距離", { dx: 6, align: "left", color: C2D.axis, size: 12 });
      g.text(gx0, gyTop + 0.6, "時間", { dy: -10, color: C2D.axis, size: 12 });
      // 目盛り
      for (let k = 0; k <= dist; k += st.gridX || 1) {
        g.line(k, gy0, k, gy0 + 0.12, { color: C2D.axis, w: 1 });
      }
      for (let h = 0; h <= tMax + 1e-9; h += st.gridT || 1) {
        const yy = gy0 + h * tScale;
        g.line(gx0, yy, gx0 - 0.12, yy, { color: C2D.axis, w: 1 });
        g.text(gx0 - 0.2, yy, `${h}`, { align: "right", size: 11, weight: "normal", color: C2D.axis });
      }

      // A,Bの線(時刻0..t まで描く = 進むほど伸びる)
      const gp = (who, tt) => {
        const x = Math.max(0, Math.min(dist, who === "a" ? posA(tt) : posB(tt)));
        return [x, gy0 + tt * tScale];
      };
      const drawGraphLine = (who, color) => {
        const pts = [];
        const NS = 40;
        for (let i = 0; i <= NS; i++) pts.push(gp(who, (i / NS) * t));
        g.path(pts, { color, w: 2.5 });
      };
      if (st.showGraph > 0.01) {
        ctxAlpha(g, st.showGraph, () => {
          drawGraphLine("a", C2D.red);
          drawGraphLine("b", C2D.blue);
        });
      }

      // 出会い/追いつきの点
      if (params.meetT != null && st.showMeet > 0.01 && t >= params.meetT - 1e-9) {
        const mx = posA(params.meetT);
        // 道の上
        g.dot(mx, roadY, { color: C2D.ink, rp: 6, alpha: st.showMeet });
        // グラフの交点
        const my = gy0 + params.meetT * tScale;
        g.dot(mx, my, { color: C2D.ink, rp: 6, alpha: st.showMeet });
        g.line(mx, gy0, mx, my, { color: C2D.ghost, dash: [4, 4], w: 1, alpha: st.showMeet });
        g.line(gx0, my, mx, my, { color: C2D.ghost, dash: [4, 4], w: 1, alpha: st.showMeet });
        g.text(mx, my, st.meetLabel || "出会い", { dy: -14, color: C2D.ink, size: 13, alpha: st.showMeet });
      }
    },
  };
}

// 透明度をまとめてかけるヘルパー(G はステートレスなので簡易に)
function ctxAlpha(g, a, fn) { fn(); }


/* ===== src/units/speed/builders/travelRound.js ===== */
// ==== ビルダー(2D): 往復のダイヤグラム ====
// 縦=距離(PからQ)、横=時間。2人がPQ間を往復し、折れ線(山型)の交点が出会い。
// 左に縦の「道」を置いて2人を動かし、右のダイヤグラムと連動させる。
//
// params:
//   dist  : PQ間の距離(km)
//   tMax  : 描く最大時間(h)
//   a: { name, v, from } from:"P"ならPから、"Q"ならQから出発して往復
//   b: { name, v, from }
//   meets : [{ t, d, label }] 出会いの時刻と位置(事前計算して渡す)
function buildTravelRound(params) {
  const { dist, tMax } = params;
  // 往復の位置(三角波)。from"P": 0→dist→0→…, from"Q": dist→0→dist→…
  function pos(who, t) {
    const period = 2 * dist / who.v;
    let u = t % period;
    if (u < 0) u += period;
    const x = u < period / 2 ? who.v * u : 2 * dist - who.v * u;
    return who.from === "Q" ? dist - x : x;
  }

  return {
    draw(g, st, screen) {
      const t = st.t * tMax;
      const xs = st.xScale;      // 時間1h = ワールド何単位
      const roadX = -1.6;        // 縦の道のx位置
      const A = params.a, B = params.b;

      // --- 道(左・縦) ---
      g.line(roadX, 0, roadX, dist, { color: C2D.edge, w: 3 });
      g.text(roadX, 0, "P", { dx: -16, color: C2D.ink });
      g.text(roadX, dist, "Q", { dx: -16, color: C2D.ink });
      const ay = pos(A, t), by = pos(B, t);
      g.dot(roadX, ay, { color: C2D.red, rp: 7, ring: true });
      g.badge(roadX, ay, A.name, { dx: -28, bg: C2D.red });
      g.dot(roadX, by, { color: C2D.blue, rp: 7, ring: true });
      g.badge(roadX, by, B.name, { dx: 28, bg: C2D.blue });

      // --- ダイヤグラム(横=時間・縦=距離) ---
      g.arrow(0, 0, tMax * xs + 0.8, 0, { color: C2D.axis, w: 1.5, head: 9 });
      g.arrow(0, 0, 0, dist + 1.2, { color: C2D.axis, w: 1.5, head: 9 });
      g.text(tMax * xs + 0.8, 0, "時間", { dx: 6, dy: 12, align: "left", size: 11, color: C2D.axis });
      g.text(0, dist + 1.2, "距離", { dy: -10, size: 11, color: C2D.axis });
      for (let h = 1; h <= tMax + 1e-9; h++) {
        g.line(h * xs, 0, h * xs, 0.18, { color: C2D.axis, w: 1 });
        g.text(h * xs, -0.7, `${h}`, { size: 11, weight: "normal", color: C2D.axis });
      }
      [0, dist].forEach((d) => {
        g.line(0, d, -0.15, d, { color: C2D.axis, w: 1 });
        g.text(-0.3, d, d === 0 ? "P" : "Q", { align: "right", size: 12, weight: "normal", color: C2D.axis });
      });
      g.line(0, dist, tMax * xs, dist, { color: C2D.grid, w: 1, dash: [4, 4] });

      // 2人の折れ線(0..t)
      if (st.showGraph > 0.01) {
        const NS = 120;
        const mk = (who) => {
          const pts = [];
          for (let i = 0; i <= NS; i++) {
            const tt = (i / NS) * t;
            pts.push([tt * xs, pos(who, tt)]);
          }
          return pts;
        };
        g.path(mk(A), { color: C2D.red, w: 2.5, alpha: st.showGraph });
        g.path(mk(B), { color: C2D.blue, w: 2.5, alpha: st.showGraph });
      }

      // 出会いの点
      (params.meets || []).forEach((m, i) => {
        const show = st[`showMeet${i + 1}`] || 0;
        if (show < 0.01 || t < m.t - 1e-9) return;
        g.dot(m.t * xs, m.d, { color: C2D.ink, rp: 6, alpha: show });
        g.line(m.t * xs, 0, m.t * xs, m.d, { color: C2D.ghost, dash: [4, 4], w: 1, alpha: show });
        g.line(0, m.d, m.t * xs, m.d, { color: C2D.ghost, dash: [4, 4], w: 1, alpha: show });
        g.text(m.t * xs, m.d, m.label, { dy: -14, size: 13, color: C2D.ink, alpha: show });
        g.dot(roadX, m.d, { color: C2D.ink, rp: 5, alpha: show * 0.7 });
      });
    },
  };
}

// ==== 単元: 速さ(2D / Canvas) ====
// registry で unit:"speed", render:"canvas2d" を一括付与される。
function makeSpeedScenarios() {
  // 出会い算: P(0)から4km/h、Q(12)から-6km/h(左へ)。出会い t=12/10=1.2h
  const meet1 = 12 / (4 + 6);
  // 追いつき算: 兄A 6km/h が 弟B 4km/h(先に2km地点)を追う。相対2km/h、差2km → 1h
  const meet2 = 2 / (6 - 4);
  // 往復: PQ=12km、A(6km/h,Pから)とB(4km/h,Qから)が往復。
  // 1回目=12÷10=1.2h(7.2km地点)。2回目=2人合わせて12×3km進んだとき=36÷10=3.6h(2.4km地点)
  const r1t = 12 / (6 + 4), r1d = 6 * r1t;
  const r2t = (12 * 3) / (6 + 4), r2d = 2 * 12 - 6 * r2t;

  const baseView = { ox: 70, oy: 40, scale: 34, yUp: false };

  return [
    {
      id: "meet", name: "① 出会い算", type: "travel",
      source: "速さ/旅人算(出会い)。例: 12km・4km/hと6km/h",
      params: {
        dist: 12, tMax: 2,
        a: { name: "A", x0: 0, v: 4 },
        b: { name: "B", x0: 12, v: -6 },
        meetT: meet1,
      },
      base: {
        view: baseView,
        t: 0, roadY: 1.0, graphBase: 3.0, tScale: 3.4,
        gridX: 2, gridT: 0.5, tick: 12,
        showGraph: 1, showMeet: 1, meetLabel: "出会い",
      },
      quiz: {
        question: "PQ間は12km。AさんはPから時速4kmで、BさんはQから時速6kmで、同時に向かい合って出発します。2人が出会うのは何時間後でしょう?",
        answer: 1.2, answerLabel: "時間（時間）",
        state: { t: 0, showGraph: 0, showMeet: 0 },
        regions: [
          { id: "road", label: "道",
            shape: { kind: "rect", x: 0, y: 0.2, w: 12, h: 1.6 } },
          { id: "graph", label: "グラフ",
            shape: { kind: "rect", x: 0, y: 3, w: 12, h: 7 } },
        ],
        hints: {
          road: [
            { kind: "ask", text: "1時間たつと、2人の間は何kmちぢまるかな。Aは4km、Bは6km進むよ。" },
            { kind: "anime", caption: "動かしてみよう。2人合わせて1時間に10kmずつ近づいていく。",
              steps: [{ dur: 2.4, state: { t: 0.3 } }] },
            { kind: "formula", text: "出会う時間 ＝ 12 ÷（4＋6）" },
            { kind: "scenario" },

// ==== ビルダー(2D): つるかめ算の面積図 ====
// 横=匹数、縦=1匹の足の本数 の長方形で「足の合計=面積」と見る。
// 全部ツルと仮定した面積に、カメへの交換で足りない分を積み増す。
//
// params:
//   total   : 合計の匹数
//   legsA   : ツルの足(少ないほう)
//   legsB   : カメの足(多いほう)
//   legsSum : 足の合計
//   ansB    : カメの数(事前計算して渡す)
function buildTurtleCrane(params) {
  const { total, legsA, legsB, legsSum, ansB } = params;

  return {
    draw(g, st, screen) {
      const k = st.k; // カメに交換した数(0..ansB, 連続)

      // --- 軸 ---
      g.arrow(0, 0, total + 1.2, 0, { color: C2D.axis, w: 1.5, head: 9 });
      g.arrow(0, 0, 0, legsB + 1.4, { color: C2D.axis, w: 1.5, head: 9 });
      g.text(total + 1.2, 0, "匹数", { dx: 6, dy: 14, align: "left", size: 11, color: C2D.axis });
      g.text(0, legsB + 1.4, "1匹の足", { dy: -10, size: 11, color: C2D.axis });
      // 目盛り(2本・4本・10匹)
      [[legsA, `${legsA}本`], [legsB, `${legsB}本`]].forEach(([y, s]) => {
        g.line(0, y, -0.15, y, { color: C2D.axis, w: 1 });
        g.text(-0.3, y, s, { align: "right", size: 12, weight: "normal", color: C2D.axis });
      });
      g.line(total, 0, total, 0.15, { color: C2D.axis, w: 1 });
      g.text(total, -0.5, `${total}匹`, { size: 12, weight: "normal", color: C2D.axis });

      // --- 仮定の長方形(全部ツル: total × legsA) ---
      if (st.showBase > 0.01) {
        const al = st.showBase;
        g.poly([[0, 0], [total, 0], [total, legsA], [0, legsA]],
          { color: C2D.edge, w: 2.5, fill: C2D.solid2, fillAlpha: al, alpha: al });
        g.text((total - k) / 2, legsA / 2, "ツル", { size: 14, color: C2D.ink, alpha: al });
      }

      // --- カメに交換した部分(右から k 匹、上に legsB-legsA 積み増し) ---
      if (k > 0.02) {
        const x0 = total - k;
        g.poly([[x0, legsA], [total, legsA], [total, legsB], [x0, legsB]],
          { color: C2D.red, w: 2.5, fill: C2D.redFill, fillAlpha: 1 });
        g.line(x0, 0, x0, legsA, { color: C2D.red, w: 2, dash: [4, 4] });
        g.text(total - k / 2, (legsA + legsB) / 2, "カメ", { size: 14, color: C2D.red });
      }

      // --- 足の合計(面積)カウンタ ---
      const legsNow = legsA * total + k * (legsB - legsA);
      g.text(0, legsB + 2.3, `足の合計 = ${Math.round(legsNow)}本`, {
        align: "left", dx: -10, size: 16, color: legsNow >= legsSum - 0.01 ? C2D.red : C2D.ink,
      });

      // --- 目標(実際の合計)の不足分ガイド ---
      if (st.showGoal > 0.01) {
        const al = st.showGoal;
        // 不足分を点線の空箱で見せる(右上)
        const x0 = total - ansB;
        g.poly([[x0, legsA], [total, legsA], [total, legsB], [x0, legsB]],
          { color: C2D.ghost, w: 1.5, dash: [5, 4], alpha: al, fill: null });
        g.text(total + 0.25, (legsA + legsB) / 2, `あと${legsSum - legsA * total}本`, {
          align: "left", size: 12, color: C2D.ghost, alpha: al,
        });
      }

      // --- 答え ---
      if (st.showAns > 0.01) {
        const al = st.showAns;
        g.badge(total - ansB / 2, -0.55, `カメ ${ansB}匹`, { bg: C2D.red, alpha: al });
        g.badge((total - ansB) / 2, -0.55, `ツル ${total - ansB}匹`, { bg: C2D.blue, alpha: al });
      }
    },
  };
}

        { dur: 3.4, caption: "右はしから1匹ずつカメに交換…。赤い面積が増えて、ちょうど26本になったところでストップ!", state: { k: ansB, showGoal: 0 } },
        { dur: 2.8, caption: "交換したのは3匹。つまりカメが3匹、ツルが7匹です。面積図なら「たりない分 ÷ 1匹の差」が目に見えます。", formula: "カメ = (26 − 2×10) ÷ (4 − 2) = 3匹 / ツル = 10 − 3 = 7匹", state: { showAns: 1 } },

}

// ==== レジストリ: 全単元のシナリオとビルダーを1つに集約 ====
// 新しい単元を足したら、ここに (1)ビルダーマップ (2)シナリオ登録 (3)単元名 を追記する。
"use strict";

// 単元の表示名(タブに出る)
const UNIT_NAMES = {
  solid: "立体図形",
  plane: "平面図形",
  speed: "速さ",
  ratio: "割合と比",
  word: "文章題",
  cases: "場合の数",
};

// 各単元の定義: id, render(バックエンド), scenarios()（その単元のシナリオ配列を返す）
const UNITS = [
  { id: "solid", render: "three",    scenarios: makeSolidScenarios },
  { id: "plane", render: "canvas2d", scenarios: makePlaneScenarios },
  { id: "speed", render: "canvas2d", scenarios: makeSpeedScenarios },
  { id: "ratio", render: "canvas2d", scenarios: makeRatioScenarios },
  { id: "word",  render: "canvas2d", scenarios: makeWordScenarios },
  { id: "cases", render: "canvas2d", scenarios: makeCasesScenarios },
];

// ビルダーマップ: type → build関数。全単元ぶんをここに集める。
const BUILDERS = {
  // solid (3D)
  cut: buildCut, cutBlocks: buildCutBlocks, unfold: buildUnfold, pyramid: buildPyramidNet,
  cone: buildCone, string: buildString, cylinder: buildCylinder, sectorPrism: buildSectorPrism,
  proj: buildProj, notch: buildNotch, lathe: buildLathe, water: buildWater, water2: buildWater2,
  cubeNet: buildCubeNet, pyramidVolume: buildPyramidVolume,
  // plane (2D)
  movePoint: buildMovePoint, rolling: buildRolling,
  // speed (2D)
  travel: buildTravel, travelRound: buildTravelRound, stream: buildStream, passTrain: buildPassTrain,
  // ratio (2D)
  saltBalance: buildSaltBalance,
  // word (2D)
  turtleCrane: buildTurtleCrane,
  // cases (2D)
  treeDiagram: buildTreeDiagram,
};

// 全シナリオをフラット化(unit/render を一括付与)
function buildAllScenarios() {
  const all = [];
  for (const u of UNITS) {
    for (const scn of u.scenarios()) {
      scn.unit = u.id;
      scn.render = scn.render || u.render;
      all.push(scn);
    }
  }
  return all;
}

const ALL_SCENARIOS = buildAllScenarios();

// ---- 進捗(localStorage。進捗記録のみに使用可・読み失敗は無視) ----
const PROGRESS_KEY = "jukuse:progress";
function loadProgress() {
  try {
    const p = JSON.parse(localStorage.getItem(PROGRESS_KEY));
    return p && typeof p === "object" && !Array.isArray(p) ? p : {};
  } catch (e) { return {}; }
}
function saveProgress(p) {
  try { localStorage.setItem(PROGRESS_KEY, JSON.stringify(p)); } catch (e) { /* 保存できなくても本体は動く */ }
}
function markProgress(scnId, patch) {
  const p = loadProgress();
  p[scnId] = Object.assign(p[scnId] || { solved: false, tries: 0, hints: 0 }, patch);
  saveProgress(p);
  return p[scnId];
}

let stageEl, backends;

function mergedState(scn, idx) {
  const s = deepClone(scn.base);
  for (let i = 0; i <= idx; i++) assignState(s, scn.steps[i].state || {});
  return s;
}
// view のようなネストオブジェクトも上書きマージ
function assignState(dst, src) {
  for (const k in src) {
    if (src[k] && typeof src[k] === "object" && !Array.isArray(src[k])) {
      dst[k] = Object.assign(dst[k] && typeof dst[k] === "object" ? { ...dst[k] } : {}, src[k]);
    } else dst[k] = src[k];
  }
  return dst;
}
function deepClone(o) {
  const r = {};
  for (const k in o) {
    if (Array.isArray(o[k])) r[k] = o[k].slice();
    else if (o[k] && typeof o[k] === "object") r[k] = { ...o[k] };
    else r[k] = o[k];
  }
  return r;
}

function lerpStates(a, b, t) {
  const out = {};
  for (const k in b) {
    const vb = b[k], va = k in a ? a[k] : vb;
    if (Array.isArray(vb)) out[k] = vb.map((x, i) => (va[i] != null ? va[i] : x) + (x - (va[i] != null ? va[i] : x)) * t);
    else if (typeof vb === "number") out[k] = (typeof va === "number" ? va : vb) + (vb - (typeof va === "number" ? va : vb)) * t;
    else if (vb && typeof vb === "object") out[k] = lerpStates(va && typeof va === "object" ? va : vb, vb, t); // view等
    else out[k] = vb;
  }
  return out;
}

function loadScenario(i) {
  const scn = App.scenarios[i];
  const nextBackend = backends[scn.render || "three"];
  // 別バックエンドに切り替わるなら前のを隠す
  if (App.backend && App.backend !== nextBackend) App.backend.show(false);
  if (App.backend) App.backend.dispose(App.bctx);
  App.backend = nextBackend;
  App.backend.show(true);
  App.backend.resize();

  App.scnIdx = i;
  App.bctx = App.backend.load(scn, BUILDERS);
  App.cur = null;
  App.stepIdx = 0;
  App.hintLevels = {};
  App.animQueue = [];
  App.overlay = null;
  App.stroke = null;   // なぞり途中のシナリオ切替で古いストロークを持ち越さない
  if (scn.quiz) enterQuizMode();       // quiz付きは「問題ファースト」
  else { App.mode = "steps"; gotoStep(0, 0.01); }
  syncModeUI();
  syncTabs();
  document.getElementById("src").textContent = scn.source || "";
}

// ---- quizモード ----
function quizBaseState(scn) {
  const s = deepClone(scn.base);
  if (scn.quiz.state) assignState(s, scn.quiz.state);
  return s;
}

// 注: hintLevels は「問題にもどる」でも維持する(仕様)。
// 解説まで見た子が同じ場所をなぞったら、続きの深さから出すため。
function enterQuizMode() {
  const scn = App.scenarios[App.scnIdx];
  App.mode = "quiz";
  App.animQueue = [];
  App.overlay = null;
  App.stroke = null;
  App.quizState = quizBaseState(scn);
  App.to = deepClone(App.quizState);
  App.from = App.cur ? deepClone(App.cur) : deepClone(App.to);
  App.t = 0; App.dur = 0.6;
  document.getElementById("stepchip").textContent = "問題";
  document.getElementById("caption").textContent = scn.quiz.question;
  document.getElementById("quizhint").textContent = "わからないときは、図の気になるところを指でなぞってみよう。";
  const f = document.getElementById("formula");
  f.textContent = ""; f.style.display = "none";
  document.getElementById("dots").innerHTML = "";
  const ans = document.getElementById("answer");
  ans.value = "";
  document.getElementById("anslabel").textContent = scn.quiz.answerLabel || "答え";
  syncModeUI();
}

// UI表示のモード切替(quiz: なぞり+答え / steps: コマ送り)
function syncModeUI() {
  const scn = App.scenarios[App.scnIdx];
  const quiz = App.mode === "quiz";
  const hasQuiz = !!scn.quiz;
  document.getElementById("stepctl").style.display = quiz ? "none" : "flex";
  document.getElementById("quizctl").style.display = quiz ? "flex" : "none";
  document.getElementById("quizhint").style.display = quiz ? "block" : "none";
  document.getElementById("ansrow").style.display = quiz && scn.quiz && scn.quiz.answer != null ? "flex" : "none";
  document.getElementById("toQuiz").style.display = !quiz && hasQuiz ? "block" : "none";
}

// なぞり(またはタップ)で region がヒットしたとき: 次の段階のヒントを出す
function onRegionHit(region) {
  const scn = App.scenarios[App.scnIdx];
  const hints = (scn.quiz.hints || {})[region.id];
  if (!hints || !hints.length) return;
  const lv = Math.min((App.hintLevels[region.id] || 0) + 1, hints.length);
  App.hintLevels[region.id] = lv;
  const hint = hints[lv - 1];
  App.overlay = { shape: region.shape, until: performance.now() + 1800 };
  markProgress(scn.id, { hints: Math.max(lv, (loadProgress()[scn.id] || {}).hints || 0) });

  const bubble = document.getElementById("quizhint");
  const tag = `${region.label || "ここ"}(ヒント${lv}/${hints.length})`;
  if (hint.kind === "ask") {
    bubble.textContent = `💡 ${tag}: ${hint.text}`;
  } else if (hint.kind === "anime") {
    bubble.textContent = `💡 ${tag}: ${hint.caption || "動きをよく見て!"}`;
    App.animQueue = hint.steps.slice();
    nextQuizAnim();
  } else if (hint.kind === "formula") {
    bubble.textContent = `💡 ${tag}: 式で書くと…`;
    const f = document.getElementById("formula");
    f.textContent = hint.text; f.style.display = "block";
  } else if (hint.kind === "scenario") {
    switchToSteps();
  }
}

function nextQuizAnim() {
  if (!App.animQueue.length) return;
  const step = App.animQueue.shift();
  assignState(App.quizState, step.state || {});
  App.to = deepClone(App.quizState);
  App.from = App.cur ? deepClone(App.cur) : deepClone(App.to);
  App.t = 0;
  App.dur = step.dur || 1.4;
}

function resetQuizFigure() {
  const scn = App.scenarios[App.scnIdx];
  App.animQueue = [];
  App.quizState = quizBaseState(scn);
  App.to = deepClone(App.quizState);
  App.from = App.cur ? deepClone(App.cur) : deepClone(App.to);
  App.t = 0; App.dur = 0.8;
}

function switchToSteps() {
  App.mode = "steps";
  App.animQueue = [];
  App.overlay = null;
  App.stroke = null;
  App.stepIdx = 0;
  gotoStep(0, 0.8);
  syncModeUI();
}

// 答え合わせ(演習): 正解→記録、まちがい→なぞり導線へ
function checkAnswer() {
  const scn = App.scenarios[App.scnIdx];
  // 全角数字・全角小数点も受け付ける(子どものタブレット入力対策)
  const raw = document.getElementById("answer").value.trim()
    .replace(/[０-９]/g, (c) => String.fromCharCode(c.charCodeAt(0) - 0xfee0))
    .replace(/[。．]/g, ".").replace(/[−ー]/g, "-");
  const bubble = document.getElementById("quizhint");
  if (!/^-?\d+(\.\d+)?$/.test(raw)) { bubble.textContent = "数字を入れてから「答え合わせ」を押してね。"; return; }
  const val = parseFloat(raw);
  const pr = markProgress(scn.id, {});
  if (Math.abs(val - scn.quiz.answer) < 1e-9) {
    markProgress(scn.id, { solved: true, tries: pr.tries + 1 });
    bubble.textContent = `🎉 正解! ${scn.quiz.answer}${scn.quiz.answerLabel ? "(" + scn.quiz.answerLabel + ")" : ""}。「解説を見る」で確かめよう。`;
    renderProblemTabs(); syncTabs();
  } else {
    markProgress(scn.id, { tries: pr.tries + 1 });
    bubble.textContent = "おしい! 図の「あやしいな」と思うところを指でなぞってみよう。ヒントが出るよ。";
  }
}

function gotoStep(idx, dur) {
  const scn = App.scenarios[App.scnIdx];
  App.stepIdx = idx;
  App.to = mergedState(scn, idx);
  App.from = App.cur ? deepClone(App.cur) : deepClone(App.to);
  App.t = 0;
  App.dur = dur ?? scn.steps[idx].dur ?? 1.4;
  const st = scn.steps[idx];
  document.getElementById("stepchip").textContent = `手順 ${idx + 1} / ${scn.steps.length}`;
  document.getElementById("caption").textContent = st.caption;
  const f = document.getElementById("formula");
  f.textContent = st.formula || "";
  f.style.display = st.formula ? "block" : "none";
  document.getElementById("prev").disabled = idx === 0;
  document.getElementById("next").disabled = idx === scn.steps.length - 1;
  document.getElementById("dots").innerHTML =
    scn.steps.map((_, j) => `<span class="dot${j <= idx ? " on" : ""}"></span>`).join("");
}

function replayStep() {
  const scn = App.scenarios[App.scnIdx];
  const idx = App.stepIdx;
  App.cur = idx === 0 ? deepClone(scn.base) : mergedState(scn, idx - 1);
  gotoStep(idx);
}

// ---- なぞり入力(2Dのみ)。画面座標→ワールド座標に直して蓄積 ----
function strokePoint(ev) {
  if (!App.bctx || !App.bctx.lastView) return null;
  const rect = stageEl.getBoundingClientRect();
  return screenToWorld(ev.clientX - rect.left, ev.clientY - rect.top, App.bctx.lastView);
}
function bindPointer() {
  let activeId = null; // 開始したポインターだけを追う(マルチタッチの混線防止)
  stageEl.addEventListener("pointerdown", (ev) => {
    if (App.mode !== "quiz" || App.backend.kind !== "canvas2d" || activeId != null) return;
    const p = strokePoint(ev);
    if (!p) return;
    App.stroke = [p];
    activeId = ev.pointerId;
    try { stageEl.setPointerCapture(ev.pointerId); } catch (e) { /* 合成イベント等では失敗してよい */ }
  });
  stageEl.addEventListener("pointermove", (ev) => {
    if (!App.stroke || ev.pointerId !== activeId) return;
    const p = strokePoint(ev);
    if (!p) return;
    const last = App.stroke[App.stroke.length - 1];
    const minStep = 6 / (App.bctx.lastView.scale || 24); // 6pxごとにサンプリング
    if (Math.hypot(p[0] - last[0], p[1] - last[1]) >= minStep) App.stroke.push(p);
  });
  const finish = (ev) => {
    if (ev.pointerId !== activeId) return;
    activeId = null;
    if (!App.stroke) return;
    const scn = App.scenarios[App.scnIdx];
    const stroke = App.stroke; App.stroke = null;
    if (App.mode !== "quiz" || !scn.quiz || !scn.quiz.regions) return;
    const region = pickRegion(stroke, scn.quiz.regions);
    if (region) onRegionHit(region);
  };
  stageEl.addEventListener("pointerup", finish);
  stageEl.addEventListener("pointercancel", (ev) => { if (ev.pointerId === activeId) { activeId = null; App.stroke = null; } });
}

// ---- 単元(unit) → 問題(problem) の2階層タブ ----
function buildUnitIndex() {
  const map = new Map();
  App.scenarios.forEach((s, idx) => {
    const uid = s.unit || "misc";
    if (!map.has(uid)) map.set(uid, { id: uid, name: UNIT_NAMES[uid] || uid, items: [] });
    map.get(uid).items.push({ scnIndex: idx, name: s.name });
  });
  App.units = [...map.values()];
}

function currentUnitId() { return App.scenarios[App.scnIdx].unit || "misc"; }

function renderUnitTabs() {
  const row = document.getElementById("units");
  row.innerHTML = "";
  App.units.forEach((u) => {
    const b = document.createElement("button");
    b.className = "unit";
    b.textContent = u.name;
    b.onclick = () => loadScenario(u.items[0].scnIndex);
    row.appendChild(b);
  });
}

function renderProblemTabs() {
  const uid = currentUnitId();
  const unit = App.units.find((u) => u.id === uid);
  const row = document.getElementById("tabs");
  row.innerHTML = "";
  const progress = loadProgress();
  unit.items.forEach((it) => {
    const b = document.createElement("button");
    b.className = "tab";
    const scn = App.scenarios[it.scnIndex];
    const solved = progress[scn.id] && progress[scn.id].solved;
    b.textContent = (solved ? "✓ " : "") + it.name;
    b.onclick = () => loadScenario(it.scnIndex);
    row.appendChild(b);
  });
}

function syncTabs() {
  const uid = currentUnitId();
  renderProblemTabs();
  document.querySelectorAll("#units .unit").forEach((el, i) =>
    el.classList.toggle("active", App.units[i].id === uid));
  const unit = App.units.find((u) => u.id === uid);
  document.querySelectorAll("#tabs .tab").forEach((el, i) =>
    el.classList.toggle("active", unit.items[i].scnIndex === App.scnIdx));
}

function init() {
  stageEl = document.getElementById("stage");
  backends = {
    three: makeThreeBackend(stageEl),
    canvas2d: makeCanvas2DBackend(stageEl),
  };
  // 初期は両方非表示(loadScenarioで必要な方をshow)
  backends.three.show(false);
  backends.canvas2d.show(false);

  App.scenarios = ALL_SCENARIOS;
  buildUnitIndex();
  renderUnitTabs();

  window.addEventListener("resize", () => App.backend && App.backend.resize());
  document.getElementById("next").onclick = () => {
    if (App.stepIdx < App.scenarios[App.scnIdx].steps.length - 1) gotoStep(App.stepIdx + 1);
  };
  document.getElementById("prev").onclick = () => {
    if (App.stepIdx > 0) gotoStep(App.stepIdx - 1, 1.0);
  };
  document.getElementById("replay").onclick = replayStep;
  document.getElementById("toSteps").onclick = switchToSteps;
  document.getElementById("toQuiz").onclick = enterQuizMode;
  document.getElementById("qreset").onclick = resetQuizFigure;
  document.getElementById("check").onclick = checkAnswer;
  document.getElementById("answer").addEventListener("keydown", (e) => {
    if (e.key === "Enter") checkAnswer();
  });
  window.addEventListener("keydown", (e) => {
    if (e.target && e.target.tagName === "INPUT") return;
    if (App.mode !== "steps") return;
    if (e.key === "ArrowRight") document.getElementById("next").click();
    if (e.key === "ArrowLeft") document.getElementById("prev").click();
  });
  bindPointer();

  loadScenario(0);

  let last = performance.now();
  const loop = (now) => {
    requestAnimationFrame(loop);
    const dt = Math.min((now - last) / 1000, 0.05);
    last = now;
    if (App.t < 1) App.t = Math.min(1, App.t + dt / App.dur);
    else if (App.mode === "quiz" && App.animQueue.length) nextQuizAnim(); // ヒントアニメの次のコマへ
    App.cur = lerpStates(App.from, App.to, easeInOut(App.t));
    // なぞりハイライト(時間で消える)
    let overlay = null;
    if (App.overlay) {
      const remain = App.overlay.until - now;
      if (remain <= 0) App.overlay = null;
      else overlay = { shape: App.overlay.shape, alpha: Math.min(1, remain / 600) * 0.9 };
    }
    App.backend.frame(App.bctx, App.cur, overlay);
  };
  requestAnimationFrame(loop);
}

window.addEventListener("DOMContentLoaded", init);

</script>
</body>
